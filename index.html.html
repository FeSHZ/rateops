<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RateOps</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:#b0c8e0;display:flex;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
#shell{width:100%;max-width:600px;min-height:100vh;display:flex;flex-direction:column;background:#f0f4f8;}
input,select,textarea,button{font-family:inherit;}
/* Force 24-hour display on all webkit browsers including iOS */
input[type="time"]::-webkit-datetime-edit-ampm-field{display:none!important;}
input[type="time"]::-webkit-inner-spin-button{display:none!important;}
details summary{list-style:none;cursor:pointer;} details summary::-webkit-details-marker{display:none;}
input:focus,select:focus,textarea:focus{outline:2px solid #93C5FD;outline-offset:0;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:4px;}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:flex-end;justify-content:center;}
#overlay.on{display:flex;}
#mbox{background:#fff;border-radius:22px 22px 0 0;padding:24px 20px 36px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;}
@media(min-width:600px){
  #mbox{border-radius:16px;margin:auto;max-height:80vh;}
  #overlay.on{align-items:center;}
  .tab-btn{font-size:12px;}
  .range-btn{font-size:12px;}
}
.tab-btn{flex:1;padding:8px 4px;border-radius:9px;border:1.5px solid #e2e8f0;background:#fff;font-size:11px;font-weight:400;cursor:pointer;color:#1a202c;transition:all .15s;}
.tab-btn.active{background:#0f2d48;color:#fff;border-color:#0f2d48;font-weight:700;}
.range-btn{padding:6px 11px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;font-size:11px;cursor:pointer;color:#718096;}
.range-btn.active{background:#0f2d48;color:#fff;border-color:#0f2d48;font-weight:700;}
</style>
</head>
<body>
<div id="shell"></div>
<div id="overlay"><div id="mbox"></div></div>
<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const APP   = 'RateOps';
const SUB   = 'Gestión de Operaciones Ro-Pax';
const AUTOR = 'By Felipe Huamaní';
const VPWD  = 'admin2024';
const APWD_DEFAULT = 'rateops*admin';
const SUPER_MASTER = 'BF-RateOps#2024!'; // contraseña maestra de recuperación — nunca cambia
let   APWD  = APWD_DEFAULT;
const DEFAULT_VESSELS = ['California Star','Cabo Star'];
// Vessel metadata: {[vesselName]: {metrosLineales, maxPasajeros}}
// stored in localStorage under 'ro_vessel_meta'
const getVesselMeta = name => {const m=ls('ro_vessel_meta')||{};return {metrosLineales:0,maxPasajeros:0,...(m[name]||{})};};
const setVesselMeta = (name,data) => {const m=ls('ro_vessel_meta')||{};m[name]={...getVesselMeta(name),...data};lss('ro_vessel_meta',m);};
const C = {nav:'#0f2d48',acc:'#e8935a',gr:'#276749',rd:'#9b2c2c',or:'#b7791f',
           bg:'#f0f4f8',wh:'#ffffff',gray:'#718096',lt:'#e2e8f0',tx:'#1a202c',pur:'#553C9A'};
const SI  = `width:100%;padding:12px 13px;border-radius:9px;border:1.5px solid #BFDBFE;font-size:15px;font-weight:600;color:#1a202c;background:#EFF6FF;box-sizing:border-box;outline:none;`;
const SL  = `display:block;font-size:10px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;`;
const SB  = `width:100%;padding:14px;background:#0f2d48;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:9px;`;
const SBW = `width:100%;padding:12px;background:#fff;color:#1a202c;border:1.5px solid #e2e8f0;border-radius:11px;font-size:13px;cursor:pointer;`;
const SBA = `flex:1;padding:13px;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;`;

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
const t2m  = t => { if(!t) return 0; const [h,m]=t.split(':').map(Number); return h*60+(m||0); };
const m2hm = m => { if(m==null||m==='') return '--'; const a=Math.abs(+m); return `${String(Math.floor(a/60)%24).padStart(2,'0')}:${String(Math.floor(a%60)).padStart(2,'0')}`; };
const addMin = (t,m) => { if(!t||m==null) return ''; return m2hm(t2m(t)+(+m)); };

// 24-hour time input: replaces type="time" with a styled text input that enforces HH:MM
// Works identically on iOS Safari, Android, Chrome Desktop
const TI = `width:100%;padding:12px 13px;border-radius:9px;border:1.5px solid #BFDBFE;font-size:22px;font-weight:700;color:#1a202c;background:#EFF6FF;box-sizing:border-box;text-align:center;letter-spacing:3px;font-family:monospace;`;
function mkTimeInput(id, value='', oninputFn=''){
  return `<input id="${id}" type="text" inputmode="numeric" maxlength="5"
    placeholder="--:--" value="${value}"
    style="${TI}"
    autocomplete="off"
    oninput="fmtTimeInput(this)${oninputFn?';'+oninputFn:''}"
    onblur="padTimeInput(this)">`;
}
window.fmtTimeInput=function(el){
  let v=el.value.replace(/[^0-9]/g,'');
  if(v.length>2) v=v.slice(0,2)+':'+v.slice(2,4);
  // validate ranges as user types
  if(v.length>=2){
    let h=parseInt(v.slice(0,2));
    if(h>23) v='23'+(v.length>2?v.slice(2):'');
  }
  if(v.length>=4){
    let m=parseInt(v.slice(3,5));
    if(m>59) v=v.slice(0,3)+'59';
  }
  el.value=v;
};
window.padTimeInput=function(el){
  const v=el.value.trim();
  if(!v||v==='--:--'){el.value='';return;}
  // Accept formats: HH:MM, H:MM, HHMM, HMM
  let clean=v.replace(/[^0-9:]/g,'');
  if(!clean) {el.value=''; return;}
  let parts=clean.split(':');
  let h,m;
  if(parts.length===2){h=parts[0];m=parts[1];}
  else{ const d=clean.replace(':',''); h=d.length>=3?d.slice(0,-2):d; m=d.length>=2?d.slice(-2):'00'; }
  h=String(Math.min(23,parseInt(h)||0)).padStart(2,'0');
  m=String(Math.min(59,parseInt(m)||0)).padStart(2,'0');
  el.value=h+':'+m;
};
const dtDiff = (d1,t1,d2,t2) => { try { return Math.round((new Date(`${d2}T${t2||'00:00'}:00`)-new Date(`${d1}T${t1||'00:00'}:00`))/60000); } catch { return 0; } };
const today  = () => new Date().toISOString().split('T')[0];
const fmtD   = d => { if(!d) return ''; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; };
const fmtN   = n => n!=null&&n!=='' ? Number(n).toLocaleString('es-MX',{maximumFractionDigits:1}) : '-';
const gid    = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const ls     = k => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return null; } };
const lss    = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} };
const rateCol = (r,t) => !r ? C.gray : +r>=(+t||23) ? C.gr : +r>=(+t||23)*.85 ? C.or : C.rd;
const effCol  = e => e==null||e==='' ? C.gray : +e>=100 ? C.gr : +e>=85 ? C.or : C.rd;

// ── FRASES MOTIVADORAS ────────────────────────────────────────────────

// Safety-II (Hollnagel), Growth Mindset (Dweck), Broaden-and-build (Fredrickson)
// Almacenamiento: 0 bytes localStorage (~25 KB en bundle) · índice: <50 bytes
const FRASES = [
  // ── PROPÓSITO Y SIGNIFICADO — Seligman PERMA (Meaning) ──

  // ── EXCELENCIA Y ESTADO DE FLUJO — Csikszentmihalyi ──

  "Cuando el flujo de carga y pasajeros funciona sin fricciones, hay alguien en tierra que lo hizo posible.",

  "La satisfacción de cerrar un turno con los datos completos y correctos es un logro real.",

  // ── CONEXIÓN Y EQUIPO — Seligman PERMA (Relationships) ──
  "La terminal funciona porque cada persona en su posición confía en las demás. Eso incluye tu parte.",

  "Cuando registras con precisión, le ahorras problemas al siguiente. Eso es trabajo en equipo real.",
  "La buena operación en terminal no es mérito de uno solo — pero sí necesita que cada uno aporte.",

  "El ambiente de trabajo se construye con actitudes. La tuya cuenta más de lo que crees.",
  "Tu experiencia en terminal es un recurso valioso. Compartirla es parte del trabajo.",
  "La comunicación fluida entre posiciones en tierra es tan crítica como la operación en el muelle.",

  "El turno que tienes delante es el único que puedes controlar. Vale la pena darlo bien.",
  "La concentración no se trata de no distraerse — se trata de volver al trabajo cuando sucede.",
  "Estar presente en el trabajo es, en sí mismo, una habilidad que protege a todo el equipo.",

  "El momento de registrar es también el momento de entender. No lo pierdas.",
  "La pausa antes de decidir cómo registrar un dato es profesionalismo, no demora.",
  "La calidad de tu atención en el turno determina la calidad de los datos que deja.",
  "Cada número bien anotado es evidencia de que alguien estuvo presente de verdad.",
  // ── VOCACIÓN Y ORGULLO PROFESIONAL ──
  "Trabajar en una terminal portuaria no es solo un empleo — es ser parte de la columna vertebral del comercio.",

  "Los puertos mueven el mundo. Las terminales como esta mueven los puertos. Y tú mueves esta terminal.",

// Rotation: one phrase per app launch, cycles through all before repeating
// ls/lss must be defined before this runs — placed after UTILS
function getPhrase(){
  let idx=parseInt(ls('ro_phrase_idx')||'0');
  if(isNaN(idx)||idx<0) idx=0;
  const phrase=FRASES[idx%FRASES.length];
  lss('ro_phrase_idx', String((idx+1)%FRASES.length));
  return phrase;
}
let PHRASE_TODAY=''; // initialized after ls/lss defined — see INIT

// ═══════════════════════════════════════════════
// FACTORIES
// ═══════════════════════════════════════════════
const newAt = () => ({id:gid(),type:'atraque',timestamp:new Date().toISOString(),
  date:today(),vessel:'',port:'',inicioDesc:'',empProyec:'',descRec:'',
  terminoDesc:'',inicioEmb:'',etc:'',etd:'',totalPlan:'',obs:'',status:'open',synced:false});
const newZ = aid => ({id:gid(),type:'zarpe',timestamp:new Date().toISOString(),
  atraqueId:aid,finDate:today(),finEmbarque:'',inicioRampa:'',horaZarpe:'',
  paxIni:'',paxFin:'',totalEmb:'',pasajeros:'',
  totalEjec:'',tiempoTotal:'',tiempoPausa:0,tiempoReal:'',
  rateNeto:'',rateBruto:'',efic:'',eficSinDelays:'',obs:'',synced:false});

// ═══════════════════════════════════════════════
// QUERIES
// ═══════════════════════════════════════════════
const getAt    = id  => S.recs.find(r=>r.type==='atraque'&&r.id===id);
const getZ     = aid => S.recs.find(r=>r.type==='zarpe'&&r.atraqueId===aid);
const openAts  = ()  => S.recs.filter(r=>r.type==='atraque'&&r.status==='open');
const delaysOf = aid => S.recs.filter(r=>r.type==='delay'&&r.atraqueId===aid);
const delMin   = aid => delaysOf(aid).reduce((s,d)=>s+(+d.delayMin||0),0);
const pendingN = ()  => S.recs.filter(r=>!r.synced).length;

// ═══════════════════════════════════════════════
// PARAMS
// ═══════════════════════════════════════════════
const getParam = aid => ({targetRate:23,minManiobra:20,targetPaxTime:30,...(S.params[aid]||{})});
const setParam = (aid,p) => { S.params[aid]={...getParam(aid),...p}; lss('ro_params',S.params); };
// Global vessel-independent params stored under '_global' key
const getGlobal = () => ({targetPaxTime:30, mtsPerPax:1.5, ...( S.params['_global']||{})});
const setGlobal = p => setParam('_global', p);

// ═══════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════
function calcEtcEtd(at) {
  const p=getParam(at.id), tp=(+at.empProyec||0)+(+at.descRec||0);
  at.totalPlan=tp||'';
  if(at.inicioDesc&&tp&&+p.targetRate){
    at.etc=addMin(at.inicioDesc,tp/+p.targetRate);
    at.etd=addMin(at.etc,+p.minManiobra||20);
  } else { at.etc=''; at.etd=''; }
  return at;
}
function calcZ(z,at) {
  const te=(+z.totalEmb||0)+(+at.descRec||0);
  z.totalEjec=te||'';
  if(!at.inicioDesc||!z.finEmbarque){z.tiempoReal='';z.rateNeto='';z.rateBruto='';z.efic='';z.eficSinDelays='';return z;}
  const tt=dtDiff(at.date,at.inicioDesc,z.finDate||at.date,z.finEmbarque);
  z.tiempoTotal=tt||'';
  let pause=0;
  if(at.terminoDesc&&at.inicioEmb) pause=Math.max(0,t2m(at.inicioEmb)-t2m(at.terminoDesc));
  z.tiempoPausa=pause||0;
  const dm=delMin(at.id), tiempoOp=Math.max(0,tt-pause), tiempoReal=Math.max(0,tiempoOp-dm);
  z.tiempoReal=tiempoReal||'';
  const p=getParam(at.id);
  if(te&&tiempoReal) z.rateNeto=+(te/tiempoReal).toFixed(2); else z.rateNeto='';
  if(te&&tiempoOp)  z.rateBruto=+(te/tiempoOp).toFixed(2);  else z.rateBruto='';
  // efic = bruto / target (with delays)
  if(z.rateBruto&&+p.targetRate) z.efic=+(+z.rateBruto/+p.targetRate*100).toFixed(1); else z.efic='';
  // eficSinDelays = neto / target — when dm=0: rateNeto=rateBruto → efic=eficSinDelays ✓
  if(z.rateNeto&&+p.targetRate) z.eficSinDelays=+(+z.rateNeto/+p.targetRate*100).toFixed(1); else z.eficSinDelays='';
  // eficPax = min(100, targetPaxTime / tiempoRealPax × 100) — only when pax times registered
  const paxMin=(z.paxIni&&z.paxFin)?Math.max(0,t2m(z.paxFin)-t2m(z.paxIni)):0;
  const gp=getGlobal();
  if(paxMin&&+gp.targetPaxTime) z.eficPax=Math.min(100,+(+gp.targetPaxTime/paxMin*100).toFixed(1)); else z.eficPax='';
  // Dynamic weighting: based on vessel capacity (metrosLineales vs pasajeros×mtsPerPax)
  // Falls back to 70/30 if no vessel metadata configured
  if(z.efic!==''&&z.eficPax!==''){
    const vm=getVesselMeta(at.vessel||'');
    const mtsPerPax=+gp.mtsPerPax||1.5;
    const capCarga=+vm.metrosLineales||0;
    const capPax=(+vm.maxPasajeros||0)*mtsPerPax;
    const total=capCarga+capPax;
    const wCarga = total>0 ? capCarga/total : 0.7;
    const wPax   = total>0 ? capPax/total   : 0.3;
    z.eficIntegral=+(+z.efic*wCarga + +z.eficPax*wPax).toFixed(1);
    z.wCarga=+wCarga.toFixed(3); z.wPax=+wPax.toFixed(3); // store for display
  } else { z.eficIntegral=''; z.wCarga=''; z.wPax=''; }
  return z;
}

// ── MOTIVO NORMALIZATION (free, no API, keyword-matching) ──────────────
// Maps free-text delay descriptions → canonical categories
const MOTIVO_RULES = [
  [/rampa|ramp/i,                    'Rampa averiada'],
  [/aduan|aduanas|migrac|document/i, 'Aduana / Documentación'],
  [/grú[a]?|crane|gr[uú]a/i,        'Espera grúa'],
  [/lluvi|rain|clima|weather|viento/i,'Condiciones climáticas'],
  [/turno|cambio turno|relevo/i,     'Cambio de turno'],
  [/llenado|fuel|combustible|bunkering/i,'Combustible / Bunkering'],
  [/pax|pasaj|embark|desembark/i,    'Flujo de pasajeros'],
  [/maniobraes|maniobra|atraq/i,     'Maniobra de atraque'],
  [/vehículo|vehiculo|carga.*tarda|block/i,'Carga bloqueante'],
  [/inspecc|inspector|port state/i, 'Inspección'],
  [/equipo|maquinar|machinery|falla.*equipo/i,'Falla de equipo'],
  [/personal|crew|tripulación/i,     'Personal insuficiente'],
];
function normalizeMot(raw){
  const s=(raw||'').trim();
  if(!s) return 'Sin motivo';
  for(const [re,cat] of MOTIVO_RULES) if(re.test(s)) return cat;
  // Fallback: capitalize first word as-is (≤25 chars)
  return s.length>25?s.slice(0,23)+'…':s.charAt(0).toUpperCase()+s.slice(1).toLowerCase();
}

function buildChartData(allRecs) {
  const zarpes = allRecs.filter(r=>r.type==='zarpe');
  const delays  = allRecs.filter(r=>r.type==='delay');
  const ats     = allRecs.filter(r=>r.type==='atraque');
  const atMap   = {};
  ats.forEach(a=>atMap[a.id]=a);

  const joined = zarpes.map(z=>{
    const a=atMap[z.atraqueId]||getAt(z.atraqueId)||{};
    const aid=z.atraqueId;
    return {...z, vessel:a.vessel, date:a.date,
      targetRate:getParam(aid).targetRate, totalPlan:a.totalPlan,
      // Extra atraque fields for derived rates
      inicioDesc:a.inicioDesc||'', terminoDesc:a.terminoDesc||'',
      inicioEmb:a.inicioEmb||'', descRec:+a.descRec||0, empProyec:+a.empProyec||0};
  }).filter(r=>r.rateNeto&&r.date);

  // Delay pareto — normalized motivos
  const delMap={};
  delays.forEach(d=>{
    const k=normalizeMot(d.motivo);
    delMap[k]=(delMap[k]||0)+(+d.delayMin||0);
  });
  const paretoItems=Object.entries(delMap).sort((a,b)=>b[1]-a[1]);
  const totalDelMin=paretoItems.reduce((s,[,v])=>s+v,0);
  let cum=0;
  const paretoData=paretoItems.map(([k,v])=>{cum+=v;return{motivo:k,mins:v,cumPct:totalDelMin?Math.round(cum/totalDelMin*100):0};});

  // Time-series aggregation
  const getWk=d=>{const dt=new Date(d),dow=dt.getDay(),diff=dt.getDate()-dow+(dow===0?-6:1);dt.setDate(diff);return dt.toISOString().split('T')[0];};
  const getMo=d=>d?d.slice(0,7):'';
  const getYr=d=>d?d.slice(0,4):'';

  function agg(fn){
    const m={};
    joined.forEach(r=>{
      const k=fn(r.date);if(!k)return;
      if(!m[k])m[k]={rates:[],ratesBruto:[],efics:[],delays:[],delayOps:new Set(),opCount:0,dates:[]};
      if(r.rateNeto)  m[k].rates.push(+r.rateNeto);        // sin demoras
      if(r.rateBruto) m[k].ratesBruto.push(+r.rateBruto);  // alcanzado
      if(r.efic)      m[k].efics.push(+r.efic);
      m[k].opCount++;
      m[k].dates.push(r.date);
    });
    delays.forEach(d=>{
      const k=fn(d.date);if(!k||!m[k])return;
      if(!m[k].delays)m[k].delays=[];
      m[k].delays.push(+d.delayMin||0);
      m[k].delayOps.add(d.atraqueId);
    });
    // Convert delayOps Set → count (for avg delay per operation)
    Object.values(m).forEach(b=>{if(b.delayOps) b.delayOpCount=b.delayOps.size;});
    return m;
  }

  return {
    weekly:  agg(getWk),
    monthly: agg(getMo),
    yearly:  agg(getYr),
    pareto:  paretoData,
    joined,
    updatedAt: new Date().toISOString()
  };
}

function flattenRec(rec) {
  if(rec.type==='atraque') return {
    type:rec.type, id:rec.id, timestamp:rec.timestamp,
    fecha:rec.date, buque:rec.vessel, puerto:rec.port||'',
    inicioDescarga:rec.inicioDesc||'', terminoDescarga:rec.terminoDesc||'',
    inicioEmbarque:rec.inicioEmb||'',
    embProyectado:rec.empProyec||0, descRecibida:rec.descRec||0,
    totalPlanificado:rec.totalPlan||0, targetRate:rec.targetRate||23,
    minManiobra:rec.minManiobra||20, etc:rec.etc||'', etd:rec.etd||'',
    observaciones:rec.obs||'', status:rec.status||'open'
  };
  if(rec.type==='zarpe') return {
    type:rec.type, id:rec.id, timestamp:rec.timestamp, idAtraque:rec.atraqueId,
    fechaFinEmbarque:rec.finDate||'', finEmbarque:rec.finEmbarque||'',
    inicioDesembPax:rec.paxIni||'', terminoDesembPax:rec.paxFin||'',
    viradoRampa:rec.inicioRampa||'', horaZarpe:rec.horaZarpe||'',
    totalEmbarcado:rec.totalEmb||0, totalPasajeros:rec.pasajeros||0,
    totalEjecutado:rec.totalEjec||0, tiempoTotal:rec.tiempoTotal||0,
    tiempoPausa:rec.tiempoPausa||0, tiempoReal:rec.tiempoReal||0,
    rateNeto:rec.rateNeto||0, rateBruto:rec.rateBruto||0,
    eficReal:rec.efic||0, eficSinDelays:rec.eficSinDelays||0,
    observaciones:rec.obs||''
  };
  if(rec.type==='delay') return {
    type:rec.type, id:rec.id, timestamp:rec.timestamp,
    idAtraque:rec.atraqueId, buque:rec.vessel||'',
    fecha:rec.date, delayMin:rec.delayMin||0, motivo:rec.motivo||''
  };
  return rec;
}

function parseCloudRecs(data) {
  // Accept flat array OR structured {atraques,zarpes,delays}
  if(Array.isArray(data)) return data;
  const out=[];
  (data.atraques||[]).forEach(row=>out.push({
    type:'atraque', id:row.id||row.ID, timestamp:row.timestamp||row.Timestamp||'',
    date:row.fecha||row.Fecha||'', vessel:row.buque||row.Buque||'', port:row.puerto||'',
    inicioDesc:row.inicioDescarga||'', terminoDesc:row.terminoDescarga||'',
    inicioEmb:row.inicioEmbarque||'',
    empProyec:+(row.embProyectado||0), descRec:+(row.descRecibida||0),
    totalPlan:+(row.totalPlanificado||0), targetRate:+(row.targetRate||23),
    minManiobra:+(row.minManiobra||20), etc:row.etc||'', etd:row.etd||'',
    obs:row.observaciones||'', status:row.status||'closed', synced:true
  }));
  (data.zarpes||[]).forEach(row=>out.push({
    type:'zarpe', id:row.id||row.ID, timestamp:row.timestamp||row.Timestamp||'',
    atraqueId:row.idAtraque||row.IDatraque||'',
    finDate:row.fechaFinEmbarque||'', finEmbarque:row.finEmbarque||'',
    paxIni:row.inicioDesembPax||'', paxFin:row.terminoDesembPax||'',
    inicioRampa:row.viradoRampa||'', horaZarpe:row.horaZarpe||'',
    totalEmb:+(row.totalEmbarcado||0), pasajeros:+(row.totalPasajeros||0),
    totalEjec:+(row.totalEjecutado||0), tiempoTotal:+(row.tiempoTotal||0),
    tiempoPausa:+(row.tiempoPausa||0), tiempoReal:+(row.tiempoReal||0),
    rateNeto:+(row.rateNeto||0), rateBruto:+(row.rateBruto||0),
    efic:+(row.eficReal||0), eficSinDelays:+(row.eficSinDelays||0),
    obs:row.observaciones||'', synced:true
  }));
  (data.delays||[]).forEach(row=>out.push({
    type:'delay', id:row.id||row.ID, timestamp:row.timestamp||row.Timestamp||'',
    atraqueId:row.idAtraque||row.IDatraque||'',
    vessel:row.buque||'', date:row.fecha||'',
    delayMin:+(row.delayMin||0), motivo:row.motivo||'', synced:true
  }));
  return out;
}

async function postRec(rec) {
  if(!S.cfg?.postUrl) return false;
  try {
    const r=await fetch(S.cfg.postUrl,{
      method:'POST', mode:'cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(flattenRec(rec))
    });
    return r.ok||r.status===202;
  } catch { return false; }
}

async function fetchCloudRecs() {
  if(!S.online||!S.cfg?.getUrl) return null;
  try {
    const r=await fetch(S.cfg.getUrl,{mode:'cors',cache:'no-store'});
    if(!r.ok) return null;
    return parseCloudRecs(await r.json());
  } catch { return null; }
}

async function testConnection() {
  const res={postOk:null,getOk:null};
  if(S.cfg?.postUrl){
    try{const r=await fetch(S.cfg.postUrl,{method:'POST',mode:'cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'ping',timestamp:new Date().toISOString()})});
    res.postOk=r.ok||r.status===202||r.status===400;}catch{res.postOk=false;}
  }
  if(S.cfg?.getUrl){
    try{const r=await fetch(S.cfg.getUrl,{mode:'cors'});res.getOk=r.ok;}catch{res.getOk=false;}
  }
  return res;
}

function rebuildCache(cloudRecs) {
  const cloud=Array.isArray(cloudRecs)?cloudRecs:[];
  const cloudIds=new Set(cloud.map(r=>r.id).filter(Boolean));
  // Always include ALL local records not already in cloud (not just unsynced)
  const localExtra=S.recs.filter(r=>r.id&&!cloudIds.has(r.id));
  S.chartCache=buildChartData([...cloud,...localExtra]);
  saveCache();
  return S.chartCache;
}

// ── CONFLICT DETECTION ────────────────────────
// Compare two atraque records; returns {type, fields}
// type: 'identical' | 'additive' | 'conflict'
function compareAtraques(local, cloud) {
  const core = ['vessel','date','inicioDesc','empProyec','descRec'];
  const extra = ['terminoDesc','inicioEmb','obs'];
  // Check core fields
  const coreDiff = core.filter(k=>String(local[k]||'').trim()!==String(cloud[k]||'').trim());
  if(coreDiff.length>0) return {type:'conflict', fields:coreDiff};
  // Check extra fields: local has data, cloud doesn't → additive
  const addFields = extra.filter(k=>{
    const lv=String(local[k]||'').trim(), cv=String(cloud[k]||'').trim();
    return lv && !cv;
  });
  // Check if local delays > cloud delays
  const localDelays=delaysOf(local.id);
  const cloudDelayCount=0; // cloud delays counted separately
  if(addFields.length>0||localDelays.length>0) return {type:'additive', fields:addFields, hasDelays:localDelays.length>0};
  return {type:'identical', fields:[]};
}

function compareZarpes(local, cloud) {
  const core=['finEmbarque','totalEmb','pasajeros'];
  const extra=['paxIni','paxFin','inicioRampa','horaZarpe','obs'];
  const coreDiff=core.filter(k=>String(local[k]||'').trim()!==String(cloud[k]||'').trim());
  if(coreDiff.length>0) return {type:'conflict', fields:coreDiff};
  const addFields=extra.filter(k=>{const lv=String(local[k]||'').trim(),cv=String(cloud[k]||'').trim();return lv&&!cv;});
  if(addFields.length>0) return {type:'additive', fields:addFields};
  return {type:'identical', fields:[]};
}

  if(!S.cfg?.postUrl){if(!silent)showModal(msgNoCfg());return;}
  if(!S.online){
    if(!silent)showModal(`<div style="text-align:center;padding:20px"><div style="font-size:36px;margin-bottom:10px">📴</div><div style="font-size:14px;font-weight:700;color:${C.nav};margin-bottom:8px">Sin conexión a internet</div><div style="font-size:12px;color:${C.gray};margin-bottom:16px">Los registros se guardarán localmente y se sincronizarán al conectarse.</div><button onclick="hideModal()" style="${SB}">Entendido</button></div>`);
    return;
  }

  // First pull cloud to detect conflicts before uploading
  const cloudRecs = await fetchCloudRecs();
  const pendingLocal = S.recs.filter(x=>!x.synced);

  if(!pendingLocal.length){
    if(cloudRecs) rebuildCache(cloudRecs);
    if(!silent) showModal(`<div style="text-align:center;padding:20px"><div style="font-size:40px;margin-bottom:10px">✅</div><div style="font-size:14px;font-weight:700;color:${C.nav};margin-bottom:8px">Sin pendientes</div><div style="font-size:12px;color:${C.gray}">No hay registros nuevos que sincronizar.</div><button onclick="hideModal()" style="${SB}">Cerrar</button></div>`);
    render(); return;
  }

  // Check for conflicts with cloud
  if(cloudRecs){
    const conflicts=[];
    for(const local of pendingLocal.filter(r=>r.type==='atraque')){
      const cloudMatch = cloudRecs.find(c=>
        c.type==='atraque' &&
        (c.vessel||'').toLowerCase()===(local.vessel||'').toLowerCase() &&
        (c.date||'')===(local.date||'')
      );
      if(cloudMatch) conflicts.push({local, cloud:cloudMatch});
    }
    for(const local of pendingLocal.filter(r=>r.type==='zarpe')){
      const localAt=getAt(local.atraqueId);
      const cloudMatch = cloudRecs.find(c=>
        c.type==='zarpe' &&
        (c.atraqueId||'')===(local.atraqueId||'')
      );
      if(cloudMatch) conflicts.push({local, cloud:cloudMatch});
    }
    if(conflicts.length>0){
      await processConflictsSequentially(conflicts, cloudRecs);
      return;
    }
  }

  // No conflicts — upload normally
  let ok=0, fail=0;
  for(const r of pendingLocal){
    if(await postRec(r)){r.synced=true;ok++;}else fail++;
  }
  if(cloudRecs){ rebuildCache(cloudRecs); S.recs=S.recs.filter(r=>!r.synced); saveRecs(); }
  if(!silent){
    showModal(`<div style="text-align:center;padding:16px">
      <div style="font-size:40px;margin-bottom:12px">${fail?'⚠️':'✅'}</div>
      <div style="font-size:15px;font-weight:700;color:${C.nav};margin-bottom:8px">Sincronización ${fail?'parcial':'completa'}</div>
      <div style="font-size:12px;color:${C.gray};margin-bottom:6px">${ok} subido(s) · ${fail} con error</div>
      <button onclick="hideModal();dispatch('go','hist');" style="${SB}">Ver Histórico</button>
    </div>`);
  }
  render();
}

// Process conflicts one by one with user interaction
async function processConflictsSequentially(conflicts, cloudRecs){
  let idx=0;
  const results={uploaded:0, skipped:0, failed:0};
  const nonConflict=S.recs.filter(r=>!r.synced&&!conflicts.find(c=>c.local.id===r.id));

  function doNext(){
    if(idx>=conflicts.length){
      // Upload non-conflict records silently then finish
      Promise.all(nonConflict.map(async r=>{
        if(await postRec(r)){r.synced=true;results.uploaded++;}else results.failed++;
      })).then(()=>{
        if(cloudRecs){ rebuildCache(cloudRecs); S.recs=S.recs.filter(r=>!r.synced); saveRecs(); }
        showModal(`<div style="text-align:center;padding:16px">
          <div style="font-size:36px;margin-bottom:10px">✅</div>
          <div style="font-size:14px;font-weight:700;color:${C.nav};margin-bottom:8px">Sincronización completada</div>
          <div style="font-size:12px;color:${C.gray};margin-bottom:16px">Subidos: ${results.uploaded} · Omitidos: ${results.skipped} · Errores: ${results.failed}</div>
          <button onclick="hideModal();dispatch('go','hist');" style="${SB}">Ver Histórico</button>
        </div>`);
        render();
      });
      return;
    }
    const {local, cloud:cloudRec}=conflicts[idx++];
    const cmp=local.type==='atraque'?compareAtraques(local,cloudRec):compareZarpes(local,cloudRec);

    const onProceed=()=>{
      postRec(local).then(ok=>{
        if(ok){local.synced=true;results.uploaded++;}else results.failed++;
        doNext();
      });
    };
    const onSkip=()=>{ results.skipped++; doNext(); };

    if(cmp.type==='identical'){
      local.synced=true; results.skipped++;
      showConflictModal(local,cloudRec,cmp,onProceed,onSkip);
    } else {
      showConflictModal(local,cloudRec,cmp,onProceed,onSkip);
    }
  }
  doNext();
}

window.dispatch = async function(a,p) {
  const go    = sc => { destroyCharts(); S.prevScreen=S.screen; S.screen=sc; S.sub=null; };
  const goSub = (sc,d) => { destroyCharts(); S.prevScreen=S.screen; S.screen=sc; S.sub=d||null; };

  if(a==='setRole')    {
    S.role=p; lss('ro_role',p);
    if(p==='admin'){ destroyCharts(); S.prevScreen=S.screen; S.screen='adm_home'; S.sub=null; render(); return; }
    if(p==='editor'){ destroyCharts(); S.prevScreen='home'; S.screen='sup_home'; S.sub=null; }
    if(p==='viewer'){ destroyCharts(); S.prevScreen='home'; S.screen='hist'; S.sub=null; }
  }
  else if(a==='logout'){ S.role=null; lss('ro_role',null); go('home'); }
  else if(a==='go')    { 
    go(p); 
    if(p==='hist'){
      // Always ensure local cache exists first (offline mode)
      if(!S.chartCache&&S.recs.filter(r=>r.type==='zarpe'&&r.rateNeto).length){
        S.chartCache=buildChartData(S.recs); saveCache();
      }
      // Then refresh from cloud if available
      if(S.online&&S.cfg?.getUrl) loadCloudAndCache();
    }
  }
  else if(a==='goSub') { goSub(p.s,p.d); }
  else if(a==='saveCfg'){ S.cfg=p; lss('ro_cfg',p); go(S.prevScreen||'sup_home'); }
  else if(a==='syncAll'){ syncAll(false); return; }

  else if(a==='addVessel') {
    const name=p.trim();
    if(!name) return;
    if(S.vessels.map(v=>v.toLowerCase()).includes(name.toLowerCase())) {
      showModal(`<div style="text-align:center;padding:10px"><div style="font-size:36px;margin-bottom:10px">⚠️</div><div style="font-size:15px;font-weight:700;color:${C.rd}">Buque ya registrado</div><div style="font-size:12px;color:${C.gray};margin:10px 0">«${name}» ya existe en la lista.</div><button onclick="hideModal()" style="${SB}">Cerrar</button></div>`);
      return;
    }
    S.vessels.push(name); lss('ro_vessels',S.vessels); hideModal();
  }
  else if(a==='renameVessel') {
    const {idx, newName} = p;
    if(newName&&idx>=0&&idx<S.vessels.length) { S.vessels[idx]=newName.trim(); lss('ro_vessels',S.vessels); }
    hideModal();
  }
  else if(a==='deleteVessel') {
    const {idx} = p;
    if(idx>=0&&idx<S.vessels.length) { S.vessels.splice(idx,1); lss('ro_vessels',S.vessels); }
    hideModal();
  }
  else if(a==='saveGlobalParams') {
    p.forEach(({aid,targetRate,minManiobra})=>setParam(aid,{targetRate,minManiobra}));
    // Propagate current global targetPaxTime to all updated vessels
    const gPax=getGlobal().targetPaxTime;
    p.forEach(({aid})=>setParam(aid,{targetPaxTime:gPax}));
    S.recs.filter(r=>r.type==='atraque'&&r.status==='open').forEach(at=>{ calcEtcEtd(at); });
    saveRecs(); hideModal();
  }
  else if(a==='changeAdminPwd') {
    const {newPwd} = p;
    if(!newPwd||newPwd.length<6) return;
    APWD = newPwd;
    lss('ro_apwd', newPwd);
    // If cloud configured, also post the new pwd so other devices get it
    if(S.cfg?.postUrl) postRec({type:'config',key:'apwd',value:newPwd,timestamp:new Date().toISOString()});
    hideModal();
  }

  else if(a==='saveAt') {
    const r=calcEtcEtd({...p,synced:false});
    // Admin editing a closed record → show impact alert first
    const existing=S.recs.find(x=>x.id===r.id);
    if(S.role==='admin' && existing?.status==='closed'){
      const linkedZ=S.recs.find(z=>z.type==='zarpe'&&z.atraqueId===r.id);
      const newZ=linkedZ?calcZ({...linkedZ},r):null;
      showAdminImpactAlert(existing, r, linkedZ, newZ, async()=>{
        const i2=S.recs.findIndex(x=>x.id===r.id);
        if(i2>=0) S.recs[i2]=r; else S.recs.unshift(r);
        if(linkedZ&&newZ){ newZ.synced=false; const zi=S.recs.findIndex(x=>x.id===newZ.id); if(zi>=0)S.recs[zi]=newZ; }
        saveRecs(); rebuildCache([]);
        if(S.online&&await postRec(r)){r.synced=true;saveRecs();}
        if(newZ&&S.online&&await postRec(newZ)){newZ.synced=true;saveRecs();}
        S.prevScreen='adm_home'; S.screen='adm_home'; S.sub=null;
        render();
      });
      return;
    }
    // Duplicate detection: same vessel + same date (any time)
    if(isDuplicateAtraque(r.vessel, r.date, r.id)){
      window._abuf = r; // store for iOS-safe onclick
      showModal(`<div style="text-align:center;padding:16px">
        <div style="font-size:40px;margin-bottom:10px">⚠️</div>
        <div style="font-size:15px;font-weight:700;color:${C.or};margin-bottom:8px">Posible registro duplicado</div>
        <div style="font-size:12px;color:${C.gray};margin-bottom:6px;line-height:1.7">
          Ya existe un atraque de <strong>${r.vessel}</strong> con fecha <strong>${fmtD(r.date)}</strong>.
        </div>
        <div style="font-size:11px;color:${C.gray};margin-bottom:18px">Guarda de todas formas si es correcto, o regresa para revisar.</div>
        <div style="display:flex;gap:10px">
          <button onclick="hideModal();dispatch('saveAtForced',window._abuf)" style="${SBA}background:${C.or};color:#fff;">Guardar de todas formas</button>
          <button onclick="hideModal()" style="${SBA}background:${C.bg};color:${C.tx};border:1.5px solid ${C.lt};">Revisar</button>
        </div>
      </div>`);
      return;
    }
    const i=S.recs.findIndex(x=>x.id===r.id);
    if(i>=0) S.recs[i]=r; else S.recs.unshift(r);
    const linkedZ=S.recs.find(z=>z.type==='zarpe'&&z.atraqueId===r.id);
    if(linkedZ){ const recalc=calcZ({...linkedZ},r); const zi=S.recs.findIndex(x=>x.id===recalc.id); if(zi>=0){S.recs[zi]=recalc;recalc.synced=false;} }
    saveRecs(); if(S.online&&await postRec(r)){r.synced=true;saveRecs();}
    const dest=S.role==='admin'?'adm_home':'sup_home';
    S.prevScreen=dest; S.screen=dest; S.sub=null;
    render(); showCopyModal('atraque', r); return;
  }
  else if(a==='saveAtForced') {
    const r=calcEtcEtd({...p,synced:false});
    const i=S.recs.findIndex(x=>x.id===r.id);
    if(i>=0) S.recs[i]=r; else S.recs.unshift(r);
    const linkedZ2=S.recs.find(z=>z.type==='zarpe'&&z.atraqueId===r.id);
    if(linkedZ2){ const recalc=calcZ({...linkedZ2},r); const zi=S.recs.findIndex(x=>x.id===recalc.id); if(zi>=0){S.recs[zi]=recalc;recalc.synced=false;} }
    saveRecs(); if(S.online&&await postRec(r)){r.synced=true;saveRecs();}
    const dest=S.role==='admin'?'adm_home':'sup_home';
    S.prevScreen=dest; S.screen=dest; S.sub=null;
    render(); showCopyModal('atraque', r); return;
  }
  else if(a==='saveZ') {
    const{z,at,closeVessel}=p;
    // Admin editing zarpe of closed vessel → show impact alert
    const existingAt=getAt(z.atraqueId);
    const existingZ=S.recs.find(x=>x.id===z.id);
    const zc=calcZ({...z,synced:false},at||existingAt||{});
    if(S.role==='admin' && existingAt?.status==='closed' && existingZ){
      showAdminImpactAlert(existingZ, zc, null, null, async()=>{
        const i2=S.recs.findIndex(x=>x.id===zc.id);
        if(i2>=0) S.recs[i2]=zc; else S.recs.unshift(zc);
        zc.synced=false; saveRecs(); rebuildCache([]);
        if(S.online&&await postRec(zc)){zc.synced=true;saveRecs();}
        hideModal(); S.prevScreen='adm_home'; S.screen='adm_home'; S.sub=null; render();
      });
      return;
    }
    const i=S.recs.findIndex(x=>x.id===zc.id);
    if(i>=0) S.recs[i]=zc; else S.recs.unshift(zc);
    if(closeVessel){const ai=S.recs.findIndex(x=>x.id===at.id);if(ai>=0)S.recs[ai].status='closed';}
    saveRecs(); if(S.online&&await postRec(zc)){zc.synced=true;saveRecs();}
    rebuildCache([]);
    hideModal();
    const dest2=S.role==='admin'?'adm_home':'sup_home';
    S.prevScreen=dest2; S.screen=dest2; S.sub=null;
    render(); showCopyModal('zarpe', zc, at);
    return;
  }
  else if(a==='saveDelays') {
    const at=getAt(p.aid);
    for(const d of p.delays) {
      if(!d.delayMin) continue;
      const rec={id:gid(),type:'delay',timestamp:new Date().toISOString(),
        atraqueId:p.aid,vessel:at?.vessel||'',date:today(),
        delayMin:+d.delayMin,motivo:d.motivo,synced:false};
      S.recs.unshift(rec);
      if(S.online&&await postRec(rec)) rec.synced=true;
    }
    saveRecs(); S.pendingDelays=[]; go('sup_home');
  }
  else if(a==='setParam') { setParam(p.aid,p.val); renderParamBar(); }

  render();
};

function destroyCharts(){Object.values(S.charts).forEach(c=>{try{c.destroy();}catch{}});S.charts={};}

function render() {
  const root=document.getElementById('shell');
  if(!S.role){renderEntry(root);return;}
  destroyCharts();
  root.innerHTML='';
  root.appendChild(mkHeader());
  const body=document.createElement('div');
  body.id='mainBody'; body.style.cssText='flex:1;overflow-y:auto;padding-bottom:2px;';
  try {
    const sc=S.screen;
    const supParamScs=['sup_home','sup_at','sup_zsel','sup_zform','sup_delay'];
    if(supParamScs.includes(sc)&&openAts().length>0) root.appendChild(mkParamBar());
    root.appendChild(body);
    if(sc==='home')             renderHome(body);
    else if(sc==='hist')        renderHist(body);
    else if(sc==='sup_home')    renderSupHome(body);
    else if(sc==='sup_at')      renderAtForm(body);
    else if(sc==='sup_zsel')    renderZSel(body);
    else if(sc==='sup_zform')   renderZForm(body);
    else if(sc==='sup_delay')   renderDelayForm(body);
    else if(sc==='sup_edit_at') { S._adminEdit=false; renderEditList(body,'atraque'); }
    else if(sc==='sup_edit_z')  { S._adminEdit=false; renderEditList(body,'zarpe'); }
    else if(sc==='adm_home')    renderAdmHome(body);
    else if(sc==='adm_edit_at') { S._adminEdit=true; renderEditList(body,'atraque'); }
    else if(sc==='adm_edit_z')  { S._adminEdit=true; renderEditList(body,'zarpe'); }
    else if(sc==='settings')    renderSettings(body);
    else { S.screen=S.role==='admin'?'adm_home':'sup_home'; renderSupHome(body); }
  } catch(err) {
    console.error('Render error on screen', S.screen, err);
    if(!root.contains(body)) root.appendChild(body);
    body.innerHTML=`<div style="padding:24px;text-align:center">
      <div style="font-size:36px;margin-bottom:12px">⚠️</div>
      <div style="font-size:13px;font-weight:700;color:#9b2c2c;margin-bottom:8px">Error al cargar pantalla</div>
      <div style="font-size:11px;color:#718096;margin-bottom:18px;word-break:break-all">${err.message||'Error desconocido'}</div>
      <button onclick="S.screen='sup_home';render();" style="${SB}">← Volver</button>
    </div>`;
  }
  root.appendChild(mkBottomBar());
}

  const syncBan=u>0?`<div style="background:#FEF3C7;padding:7px 14px;display:flex;align-items:center;justify-content:space-between;">
    <span style="font-size:11px;color:#744210">📤 ${u} registro(s) pendiente(s)</span>

  const supScs=['sup_home','sup_at','sup_zsel','sup_zform','sup_delay','sup_edit_at','sup_edit_z'];
  const admScs=['adm_home','adm_edit_at','adm_edit_z'];
  const tabs=[
    {sc:'home',    ic:'🏠', lb:'Inicio',      active:S.screen==='home'},
    {sc:'sup_home',ic:'⚓', lb:'Operaciones',  active:supScs.includes(S.screen)},
    {sc:'hist',    ic:'📊', lb:'Histórico',   active:S.screen==='hist'},
    {sc:'adm_home',ic:'🔐', lb:'Admin',        active:admScs.includes(S.screen)}
  ];
  const tabsHTML=tabs.map(({sc,ic,lb,active})=>{
    const col=active?(sc==='adm_home'?C.pur:C.nav):C.gray;
    const border=active?`3px solid ${sc==='adm_home'?C.pur:C.nav}`:'3px solid transparent';
    const clickFn=sc==='adm_home'
      ?`showAdminLoginModal();`
      :`dispatch('go','${sc}')`;
    return `<button onclick="${clickFn}" style="flex:1;padding:9px 0 6px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:${border};">
      <span style="font-size:18px;line-height:1.2">${ic}</span>
      <span style="font-size:9px;color:${col};font-weight:${active?700:400}">${lb}</span>
    </button>`;
  }).join('');
  wrap.innerHTML=syncBan+`<div style="display:flex;">${tabsHTML}</div>`;
  return wrap;
}

window.saveVesselMetadata=function(n){
  // Save global mts/pax
  const mtsPerPax=parseFloat(document.getElementById('gp_mts_pax')?.value)||1.5;
  const oldMts=getGlobal().mtsPerPax;
  setGlobal({mtsPerPax});
  // Save per-vessel metadata
  for(let i=0;i<n;i++){
    const mtsEl=document.getElementById('vm_mts_'+i);
    const paxEl=document.getElementById('vm_pax_'+i);
    if(!mtsEl) continue;
    const vessel=mtsEl.dataset.vessel;
    setVesselMeta(vessel,{
      metrosLineales:parseFloat(mtsEl.value)||0,
      maxPasajeros:parseFloat(paxEl?.value)||0
    });
  }
  // Recalculate ALL zarpes with new weights
  S.recs.filter(r=>r.type==='zarpe').forEach(z=>{
    const at=getAt(z.atraqueId);
    if(at){const recalc=calcZ({...z},at);const zi=S.recs.findIndex(x=>x.id===recalc.id);if(zi>=0){S.recs[zi]=recalc;recalc.synced=false;}}
  });
  saveRecs(); rebuildCache([]);
  hideModal();
  showModal(`<div style="text-align:center;padding:16px">
    <div style="font-size:40px;margin-bottom:10px">✅</div>
    <div style="font-size:14px;font-weight:700;color:${C.gr};margin-bottom:8px">Capacidades guardadas</div>
    <div style="font-size:11px;color:${C.gray};margin-bottom:16px;line-height:1.6">La ponderación dinámica fue recalculada en todos los registros.</div>
    <button onclick="hideModal()" style="${SB}">Listo</button>
  </div>`);
};

window.saveTargetRange=function(){
  const from=document.getElementById('tr_from')?.value||'';
  const to  =document.getElementById('tr_to')?.value||'';
  const targetRate=parseFloat(document.getElementById('tr_rate')?.value)||23;
  const minManiobra=parseFloat(document.getElementById('tr_man')?.value)||20;
  const targetPaxTime=parseFloat(document.getElementById('tr_pax')?.value)||30;
  if(!from){alert('Ingresa la fecha de inicio del rango.');return;}

  const isRetroactive = from<=today();
  const affectedAts = isRetroactive
    ? S.recs.filter(r=>r.type==='atraque'&&r.date>=from&&(!to||r.date<=to))
    : [];

  const doSave=()=>{
    const ranges=ls('ro_target_ranges')||[];
    // Insert sorted by from-date
    ranges.push({from,to,targetRate,minManiobra,targetPaxTime});
    ranges.sort((a,b)=>a.from.localeCompare(b.from));
    lss('ro_target_ranges',ranges);
    // Also update global defaults
    setGlobal({targetRate,minManiobra,targetPaxTime});
    // Apply to all atraques in range and recalc linked zarpes
    affectedAts.forEach(at=>{
      setParam(at.id,{targetRate,minManiobra,targetPaxTime});
      calcEtcEtd(at); // update ETC/ETD
      const z=getZ(at.id);
      if(z){const recalc=calcZ({...z},at);const zi=S.recs.findIndex(x=>x.id===recalc.id);if(zi>=0){S.recs[zi]=recalc;recalc.synced=false;}}
    });
    if(affectedAts.length){saveRecs();rebuildCache([]);}
    hideModal();
    showModal(`<div style="text-align:center;padding:16px">
      <div style="font-size:40px;margin-bottom:10px">✅</div>
      <div style="font-size:14px;font-weight:700;color:${C.gr};margin-bottom:8px">Rango guardado</div>
      <div style="font-size:11px;color:${C.gray};margin-bottom:16px;line-height:1.6">
        ${affectedAts.length?`Se actualizaron <strong>${affectedAts.length}</strong> atraque(s) en el rango retroactivo y se recalcularon sus zarpes.`:'Rango configurado. Aplicará a nuevas operaciones en ese período.'}
      </div>
      <button onclick="hideModal();render();" style="${SB}">Listo</button>
    </div>`);
  };

  if(isRetroactive&&affectedAts.length>0){
    showModal(`<div style="text-align:center;margin-bottom:16px">
      <div style="font-size:36px;margin-bottom:8px">⚠️</div>
      <div style="font-size:15px;font-weight:700;color:${C.or};margin-bottom:8px">Cambio retroactivo</div>
      <div style="font-size:12px;color:${C.gray};line-height:1.7;margin-bottom:12px">
        La fecha de inicio <strong>${fmtD(from)}</strong> es anterior a hoy.<br>
        Esto modificará los targets de <strong>${affectedAts.length}</strong> atraque(s) ya registrado(s)${to?' hasta '+fmtD(to):''},<br>
        recalculando sus ETC, ETD, eficiencias e indicadores históricos.
      </div>
      <div style="background:#FEE2E2;border-radius:8px;padding:9px 12px;margin-bottom:16px;font-size:11px;color:#991B1B;line-height:1.6">
        🔐 Esta acción afectará los gráficos del Histórico.
      </div>
      <div style="display:flex;gap:10px">
        <button onclick="hideModal();(${doSave})()" style="${SBA}background:${C.or};color:#fff;font-weight:700;">Confirmar cambio retroactivo</button>
        <button onclick="hideModal();showParamsModal()" style="${SBA}background:${C.bg};color:${C.tx};border:1.5px solid ${C.lt};">Revisar</button>
      </div>
    </div>`);
    return;
  }
  doSave();
};

        <button id="btnOpW" onclick="filterOps('week',this)" style="font-size:10px;padding:3px 10px;border-radius:8px;border:1.5px solid ${C.nav};background:${C.nav};color:#fff;cursor:pointer;font-weight:700">Semana</button>
        <button id="btnOpM" onclick="filterOps('month',this)" style="font-size:10px;padding:3px 10px;border-radius:8px;border:1.5px solid ${C.lt};background:#fff;color:${C.gray};cursor:pointer">Mes</button>
      </div>
    </div>
    <div id="opsContainer">
    ${(()=>{
      const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-7);
      const cutStr=cutoff.toISOString().split('T')[0];
      return cd.joined.filter(r=>r.date>=cutStr);
    })().slice(0,20).map(r=>{
      // Derived rates
      const paxMin=(r.paxIni&&r.paxFin)?Math.max(0,t2m(r.paxFin)-t2m(r.paxIni)):0;
      const paxRate=(paxMin&&r.pasajeros)?+(r.pasajeros/paxMin).toFixed(2):'';
      // Roll Off Rate: solo cuando hay split (terminoDesc registrado)
      const rollOffMin=(r.inicioDesc&&r.terminoDesc)?Math.max(0,t2m(r.terminoDesc)-t2m(r.inicioDesc)):0;
      const rollOffRate=(rollOffMin&&r.descRec)?+(+r.descRec/rollOffMin).toFixed(2):'';
      // Roll On Rate: solo cuando hay split (inicioEmb registrado)
      const rollOnMin=(r.inicioEmb&&r.finEmbarque)?Math.max(0,t2m(r.finEmbarque)-t2m(r.inicioEmb)):0;
      const rollOnRate=(rollOnMin&&r.empProyec)?+(+r.empProyec/rollOnMin).toFixed(2):'';
      const showSplit=rollOffRate||rollOnRate;
      return `
      <div style="background:#fff;border-radius:12px;padding:12px 15px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div><div style="font-weight:700;font-size:14px">${r.vessel||'--'}</div><div style="font-size:11px;color:${C.gray}">${fmtD(r.date)}</div></div>
          <div style="text-align:right">
            <div style="font-size:22px;font-weight:700;color:${rateCol(r.rateBruto,r.targetRate)}">${r.rateBruto||'--'}</div>
            <div style="font-size:9px;color:${C.gray}">RATE Alcanzado</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:${showSplit||paxRate?'5':'0'}px">
          ${[
            ['Plan',     r.totalPlan?fmtN(r.totalPlan)+' m':'--'],
            ['Ejec.',    r.totalEjec?fmtN(r.totalEjec)+' m':'--'],
            r.eficIntegral!==''&&r.eficIntegral!=null
              ? ['Efic. Integral', r.eficIntegral+'%']
              : ['Efic. Carga',    r.efic!=null&&r.efic!==''?r.efic+'%':'--']
          ].map(([k,v])=>`
            <div style="background:${C.bg};border-radius:7px;padding:5px 7px;text-align:center"><div style="font-size:8px;color:${C.gray}">${k}</div><div style="font-size:11px;font-weight:600">${v}</div></div>`).join('')}
        </div>        ${showSplit?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:${paxRate?'5':'0'}px">
          ${rollOffRate?`<div style="background:#EFF6FF;border-radius:7px;padding:5px 7px;text-align:center"><div style="font-size:8px;color:#1E40AF">Roll Off Rate</div><div style="font-size:11px;font-weight:600;color:#1E40AF">${rollOffRate} m/min</div></div>`:''}
          ${rollOnRate?`<div style="background:#F0FFF4;border-radius:7px;padding:5px 7px;text-align:center"><div style="font-size:8px;color:#276749">Roll On Rate</div><div style="font-size:11px;font-weight:600;color:#276749">${rollOnRate} m/min</div></div>`:''}
        </div>`:''}
        ${paxRate?`<div style="background:#FDF4FF;border-radius:7px;padding:5px 9px;display:flex;justify-content:space-between;align-items:center;margin-bottom:${r.eficPax!==''&&r.eficPax!=null?'5':'0'}px">
          <div style="font-size:8px;color:#6B21A8;font-weight:700">Desemb. Pax Rate</div>
          <div style="font-size:11px;font-weight:600;color:#6B21A8">${paxRate} pax/min · ${r.pasajeros} pax</div>
        </div>`:''}
        ${r.eficPax!==''&&r.eficPax!=null?`<div style="background:#F5F3FF;border-radius:7px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:${r.eficIntegral!==''&&r.eficIntegral!=null?'5':'0'}px">
          <div style="font-size:8px;color:#5B21B6;font-weight:700">Efic. Pax (%)</div>
          <div style="font-size:13px;font-weight:700;color:${+r.eficPax>=100?C.gr:+r.eficPax>=85?C.or:C.rd}">${r.eficPax}%</div>
        </div>`:''}
        ${r.eficIntegral!==''&&r.eficIntegral!=null?`<div style="background:linear-gradient(90deg,#EDE9FE,#DBEAFE);border-radius:7px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:9px;color:#3730A3;font-weight:700">Efic. Integral (70% carga · 30% pax)</div>
            <div style="font-size:8px;color:#6366F1">mix ponderado de carga y pasajeros</div>
          </div>
          <div style="font-size:15px;font-weight:700;color:${+r.eficIntegral>=95?C.gr:+r.eficIntegral>=80?C.or:C.rd}">${r.eficIntegral}%</div>
        </div>`:''}
      </div>`}).join('')}
    </div>`:''}
  </div>`;

  if(noData) { return; }

  // ── Reusable op card renderer ─────────────────
  function renderOpCard(r,showSplit,rollOffRate,rollOnRate,paxRate){
    return `<div style="background:#fff;border-radius:12px;padding:12px 15px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div><div style="font-weight:700;font-size:14px">${r.vessel||'--'}</div><div style="font-size:11px;color:${C.gray}">${fmtD(r.date)}</div></div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:700;color:${rateCol(r.rateBruto,r.targetRate)}">${r.rateBruto||'--'}</div>
          <div style="font-size:9px;color:${C.gray}">RATE Alcanzado</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:${showSplit||paxRate?'5':'0'}px">
        ${[['Plan',r.totalPlan?fmtN(r.totalPlan)+' m':'--'],['Ejec.',r.totalEjec?fmtN(r.totalEjec)+' m':'--'],
          r.eficIntegral!==''&&r.eficIntegral!=null?['Efic. Integral',r.eficIntegral+'%']:['Efic. Carga',r.efic!=null&&r.efic!==''?r.efic+'%':'--']
        ].map(([k,v])=>`<div style="background:${C.bg};border-radius:7px;padding:5px 7px;text-align:center"><div style="font-size:8px;color:${C.gray}">${k}</div><div style="font-size:11px;font-weight:600">${v}</div></div>`).join('')}
      </div>
      ${showSplit?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:${paxRate?'5':'0'}px">
        ${rollOffRate?`<div style="background:#EFF6FF;border-radius:7px;padding:5px 7px;text-align:center"><div style="font-size:8px;color:#1E40AF">Roll Off Rate</div><div style="font-size:11px;font-weight:600;color:#1E40AF">${rollOffRate} m/min</div></div>`:''}
        ${rollOnRate?`<div style="background:#F0FFF4;border-radius:7px;padding:5px 7px;text-align:center"><div style="font-size:8px;color:#276749">Roll On Rate</div><div style="font-size:11px;font-weight:600;color:#276749">${rollOnRate} m/min</div></div>`:''}
      </div>`:''}
      ${paxRate?`<div style="background:#FDF4FF;border-radius:7px;padding:5px 9px;display:flex;justify-content:space-between;align-items:center;margin-bottom:${r.eficPax!==''&&r.eficPax!=null?'5':'0'}px">
        <div style="font-size:8px;color:#6B21A8;font-weight:700">Desemb. Pax Rate</div>
        <div style="font-size:11px;font-weight:600;color:#6B21A8">${paxRate} pax/min · ${r.pasajeros} pax</div>
      </div>`:''}
      ${r.eficPax!==''&&r.eficPax!=null?`<div style="background:#F5F3FF;border-radius:7px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:${r.eficIntegral!==''&&r.eficIntegral!=null?'5':'0'}px">
        <div style="font-size:8px;color:#5B21B6;font-weight:700">Efic. Pax (%)</div>
        <div style="font-size:13px;font-weight:700;color:${+r.eficPax>=100?C.gr:+r.eficPax>=85?C.or:C.rd}">${r.eficPax}%</div>
      </div>`:''}
      ${r.eficIntegral!==''&&r.eficIntegral!=null?`<div style="background:linear-gradient(90deg,#EDE9FE,#DBEAFE);border-radius:7px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:9px;color:#3730A3;font-weight:700">Efic. Integral</div>
        <div style="font-size:8px;color:#6366F1">ponderación dinámica carga/pax</div></div>
        <div style="font-size:15px;font-weight:700;color:${+r.eficIntegral>=95?C.gr:+r.eficIntegral>=80?C.or:C.rd}">${r.eficIntegral}%</div>
      </div>`:''}
    </div>`;
  }

  // filterOps: toggle week/month view for últimas operaciones
  window.filterOps=function(period,btn){
    document.querySelectorAll('#btnOpW,#btnOpM').forEach(b=>{
      b.style.background='#fff'; b.style.color=C.gray; b.style.borderColor=C.lt; b.style.fontWeight='400';
    });
    btn.style.background=C.nav; btn.style.color='#fff'; btn.style.borderColor=C.nav; btn.style.fontWeight='700';
    const days=period==='week'?7:31;
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days);
    const cutStr=cutoff.toISOString().split('T')[0];
    const filtered=(cd?.joined||[]).filter(r=>r.date>=cutStr);
    const container=document.getElementById('opsContainer');
    if(!container) return;
    if(!filtered.length){container.innerHTML=`<div style="text-align:center;padding:20px;font-size:12px;color:${C.gray}">Sin operaciones en el período seleccionado.</div>`;return;}
    container.innerHTML=filtered.slice(0,20).map(r=>{
      const paxMin=(r.paxIni&&r.paxFin)?Math.max(0,t2m(r.paxFin)-t2m(r.paxIni)):0;
      const paxRate=(paxMin&&r.pasajeros)?+(r.pasajeros/paxMin).toFixed(2):'';
      const rollOffMin=(r.inicioDesc&&r.terminoDesc)?Math.max(0,t2m(r.terminoDesc)-t2m(r.inicioDesc)):0;
      const rollOffRate=(rollOffMin&&r.descRec)?+(+r.descRec/rollOffMin).toFixed(2):'';
      const rollOnMin=(r.inicioEmb&&r.finEmbarque)?Math.max(0,t2m(r.finEmbarque)-t2m(r.inicioEmb)):0;
      const rollOnRate=(rollOnMin&&r.empProyec)?+(+r.empProyec/rollOnMin).toFixed(2):'';
      const showSplit=rollOffRate||rollOnRate;
      return renderOpCard(r,showSplit,rollOffRate,rollOnRate,paxRate);
    }).join('');
  };

  // Chart rendering logic
  let customFrom='', customTo=today();

  // Aggregate records filtered by date range, grouped by week
  function buildAgg(){
    if(!cd) return {};
    const getWk=d=>{const dt=new Date(d),dow=dt.getDay(),diff=dt.getDate()-dow+(dow===0?-6:1);dt.setDate(diff);return dt.toISOString().split('T')[0];};
    const m={};
    (cd.joined||[]).forEach(r=>{
      if(!r.date) return;
      if(customFrom&&r.date<customFrom) return;
      if(customTo&&r.date>customTo) return;
      const k=getWk(r.date);
      if(!m[k])m[k]={rates:[],ratesBruto:[],efics:[],delays:[],delayOps:new Set(),opCount:0,dates:[]};
      if(r.rateNeto)  m[k].rates.push(+r.rateNeto);
      if(r.rateBruto) m[k].ratesBruto.push(+r.rateBruto);
      if(r.efic)      m[k].efics.push(+r.efic);
      m[k].opCount++;
      m[k].dates.push(r.date);
    });
    // Add delays filtered by date range from local recs
    S.recs.filter(r=>r.type==='delay').forEach(d=>{
      if(!d.date) return;
      if(customFrom&&d.date<customFrom) return;
      if(customTo&&d.date>customTo) return;
      const k=getWk(d.date);
      if(!m[k]) return;
      if(!m[k].delays) m[k].delays=[];
      m[k].delays.push(+d.delayMin||0);
      m[k].delayOps.add(d.atraqueId);
    });
    Object.values(m).forEach(b=>{if(b.delayOps) b.delayOpCount=b.delayOps.size;});
    return m;
  }

  const avg=a=>{const v=a.filter(x=>x!=null&&!isNaN(x));return v.length?+(v.reduce((s,x)=>s+(+x),0)/v.length).toFixed(2):null;};
  const sum=a=>a.reduce((s,x)=>s+(+x||0),0);

  function drawCharts(){
    destroyCharts();
    const src=buildAgg();
    const keys=Object.keys(src).sort();
    if(!keys.length){
      const body=document.getElementById('mainBody');
      if(body){const msg=document.createElement('div');msg.style.cssText='text-align:center;padding:20px;font-size:12px;color:#718096;';msg.textContent='Sin datos para el rango seleccionado.';const ch=document.getElementById('ch_r');if(ch)ch.closest?.('div')?.appendChild(msg);}
      return;
    }
    const labels=keys.map(k=>fmtD(k).slice(0,5));
    const ratesAlcanzado  = keys.map(k=>avg(src[k]?.ratesBruto||[]));   // RATE Bruto = Alcanzado
    const ratesSinDemoras = keys.map(k=>avg(src[k]?.rates||[]));         // RATE Neto  = Sin Demoras
    const efics           = keys.map(k=>avg(src[k]?.efics||[]));
    // Delays: total minutos / número de operaciones de la semana
    const dels = keys.map(k=>{
      const b=src[k]; if(!b||!b.delays?.length) return null;
      const total=sum(b.delays);
      const nOps=b.opCount||1;
      return +(total/nOps).toFixed(1);
    });
    const TARGET=23; // could use per-op avg but 23 is the universal target

    const bo={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      elements:{point:{radius:4,hoverRadius:7}},
      scales:{x:{grid:{display:false},ticks:{font:{size:9},maxRotation:40}},
              y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:9}}}}};

    // ── RATE chart: 3 lines ──────────────────────────────
    const c1=document.getElementById('ch_r');
    if(c1) S.charts.r=new Chart(c1,{type:'line',data:{labels,datasets:[
      {data:keys.map(()=>TARGET),borderColor:'#b7791f',borderWidth:1.5,borderDash:[6,3],
       pointRadius:0,fill:false,label:'Target',tension:0},
      {data:ratesAlcanzado,borderColor:'#0f2d48',backgroundColor:'rgba(15,45,72,.07)',
       borderWidth:2.5,fill:true,tension:.35,pointBackgroundColor:'#0f2d48',
       pointRadius:4,label:'Alcanzado (c/demoras)'},
      {data:ratesSinDemoras,borderColor:'#276749',backgroundColor:'rgba(39,103,73,.06)',
       borderWidth:2,fill:false,tension:.35,pointBackgroundColor:'#276749',
       pointRadius:4,borderDash:[3,2],label:'Sin demoras'},
    ]},options:{...bo,
      plugins:{legend:{display:true,position:'top',labels:{font:{size:9},boxWidth:8,padding:8}}},
      scales:{...bo.scales,y:{...bo.scales.y,min:0,
        title:{display:true,text:'mts/min',font:{size:8}}}}}});

    // ── EFICIENCIA chart ─────────────────────────────────
    const c2=document.getElementById('ch_e');
    if(c2) S.charts.e=new Chart(c2,{type:'bar',data:{labels,datasets:[
      {data:efics,backgroundColor:efics.map(v=>v>=100?'rgba(39,103,73,.8)':v>=85?'rgba(183,121,31,.8)':'rgba(155,44,44,.8)'),borderRadius:5,label:'Eficiencia (%)'}
    ]},options:{...bo,plugins:{legend:{display:false}},scales:{...bo.scales,y:{...bo.scales.y,min:0,max:130,
      title:{display:true,text:'%',font:{size:8}}}}}});

    // ── DELAYS chart (min promedio por operación) ─────────
    const c3=document.getElementById('ch_d');
    if(c3) S.charts.d=new Chart(c3,{type:'bar',data:{labels,datasets:[
      {data:dels,backgroundColor:'rgba(155,44,44,.6)',borderRadius:5,label:'Delay prom. por op.'}
    ]},options:{...bo,plugins:{legend:{display:false}},scales:{...bo.scales,y:{...bo.scales.y,min:0,
      title:{display:true,text:'min/op',font:{size:8}}}}}});

    // ── PARETO ───────────────────────────────────────────
    const c4=document.getElementById('ch_p');
    if(c4&&cd.pareto?.length){
      const pl=cd.pareto;
      const pLabels=pl.map(x=>{const w=x.motivo;return w.length>20?w.slice(0,18)+'…':w;});
      const pMins  =pl.map(x=>x.mins);
      const pCum   =pl.map(x=>x.cumPct);
      S.charts.p=new Chart(c4,{
        data:{labels:pLabels,datasets:[
          {type:'bar',data:pMins,backgroundColor:pMins.map((_,i)=>{
            const pct=pl[i].cumPct;
            return pct<=50?'rgba(155,44,44,.85)':pct<=80?'rgba(183,121,31,.8)':'rgba(100,140,80,.7)';
          }),borderRadius:4,yAxisID:'y',order:2,label:'Minutos'},
          {type:'line',data:pCum,borderColor:'#0f2d48',borderWidth:2.5,
           pointBackgroundColor:'#0f2d48',pointRadius:5,fill:false,yAxisID:'y2',order:1,label:'% Acumulado'}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:true,position:'top',labels:{font:{size:9},boxWidth:8,padding:8}}},
          scales:{
            x:{grid:{display:false},ticks:{font:{size:8},maxRotation:35}},
            y:{position:'left',title:{display:true,text:'Minutos',font:{size:8}},
               ticks:{font:{size:8}},grid:{color:'rgba(0,0,0,.05)'}},
            y2:{position:'right',min:0,max:100,
                title:{display:true,text:'% Acum.',font:{size:8}},
                ticks:{font:{size:8},callback:v=>v+'%'},grid:{display:false}}}}});
    }
  }

  // Draw charts immediately (Chart.js canvas needs to be in DOM first — use rAF)
  requestAnimationFrame(()=>{
    drawCharts();
    // Wire Apply Range button
    document.getElementById('btnApplyRange')?.addEventListener('click',()=>{
      customFrom=document.getElementById('dateFrom')?.value||'';
      customTo=document.getElementById('dateTo')?.value||today();
      drawCharts();
    });
  });
}

// ═══════════════════════════════════════════════
// SUP HOME
// ═══════════════════════════════════════════════
function renderSupHome(c){
  const oas=openAts();
  const latAt=S.recs.filter(r=>r.type==='atraque')[0];
  const recent=S.recs.filter(r=>r.type==='atraque').slice(0,5);

  // Build copy section safely (avoid nested template literal failures)
  let copySection='';
  if(recent.length){
    const rows=recent.map(at=>{
      const z=getZ(at.id);
      const vessel=String(at.vessel||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const aid=at.id;
      const zBtn=z
        ?`<button onclick="copyZarpe('${z.id}','${at.id}')" style="padding:6px 13px;background:#F0FFF4;color:#276749;border:1px solid #9AE6B4;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Datos Zarpe</button>`
        :`<span style="font-size:11px;color:${C.gray};padding:6px 0">Zarpe no registrado aún</span>`;
      return `<div style="border-bottom:1px solid ${C.lt};padding:8px 0">
        <div style="font-size:12px;font-weight:600;color:${C.tx};margin-bottom:6px">🚢 ${vessel} · ${fmtD(at.date)}</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          <button onclick="copyAtraque('${aid}')" style="padding:6px 13px;background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">Datos Atraque</button>
          ${zBtn}
        </div>
      </div>`;
    }).join('');
    copySection=`<div style="background:#fff;border-radius:13px;padding:13px 15px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)">
      <div style="font-size:10px;font-weight:700;color:#25D366;margin-bottom:10px;letter-spacing:.5px">📋 COPIAR PARA WHATSAPP</div>
      ${rows}
    </div>`;
  }

  // Build last-atraque card safely
  let atCard='';
  if(latAt){
    const vessel=String(latAt.vessel||'').replace(/</g,'&lt;');
    const statusDiv=latAt.status==='open'
      ?`<div style="font-size:10px;background:rgba(100,220,120,.15);border-radius:7px;padding:5px 10px;color:rgba(150,255,170,.9)">● Atraque abierto — Zarpe pendiente</div>`
      :(()=>{
          const z=getZ(latAt.id);
          return z?`<div style="display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.08);border-radius:7px;padding:6px 11px"><span style="font-size:10px;opacity:.6">✓ Cerrado</span><span style="font-size:20px;font-weight:700;color:${rateCol(z.rateNeto,getParam(latAt.id).targetRate)}">${z.rateNeto||'--'} mts/min</span></div>`:'';
        })();
    atCard=`<div style="background:${C.nav};border-radius:14px;padding:16px;margin-bottom:14px;color:#fff">
      <div style="font-size:9px;opacity:.4;margin-bottom:3px;letter-spacing:.5px">${latAt.status==='closed'?'ÚLTIMO ZARPE':'ÚLTIMO ATRAQUE'} · ${fmtD(latAt.date)}</div>
      <div style="font-size:19px;font-weight:700;margin-bottom:2px">${vessel}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:10px 0">
        ${(()=>{
          const z=latAt.status==='closed'?getZ(latAt.id):null;
          if(latAt.status==='closed'&&z){
            return [
              ['Inicio Desc.',latAt.inicioDesc||'--'],
              ['ATC',z.finEmbarque||'--'],
              ['ATD',z.horaZarpe||'--']
            ];
          }
          return [
            ['Inicio Desc.',latAt.inicioDesc||'--'],
            ['ETC',latAt.etc||'--'],
            ['ETD',latAt.etd||'--']
          ];
        })().map(([k,v])=>`<div style="background:rgba(255,255,255,.1);border-radius:9px;padding:8px;text-align:center"><div style="font-size:8px;opacity:.5;margin-bottom:2px">${k}</div><div style="font-size:15px;font-weight:700">${v}</div></div>`).join('')}
      </div>
      ${(()=>{
        if(latAt.status!=='closed') return '';
        const z=getZ(latAt.id);
        if(!z) return '';
        // Tiempo Roll Off/On: inicioDesc → finEmbarque, descontando parada si existe
        let rollMin=null;
        if(latAt.inicioDesc&&z.finEmbarque){
          const total=dtDiff(latAt.date,latAt.inicioDesc,z.finDate||latAt.date,z.finEmbarque);
          const pause=(latAt.terminoDesc&&latAt.inicioEmb)?Math.max(0,t2m(latAt.inicioEmb)-t2m(latAt.terminoDesc)):0;
          rollMin=Math.max(0,total-pause);
        }
        // Tiempo Desembarque Pax: paxIni → paxFin
        let paxMin=null;
        if(z.paxIni&&z.paxFin) paxMin=Math.max(0,t2m(z.paxFin)-t2m(z.paxIni));
        // Tiempo Maniobra Desatraque: Virado de Rampa → ATD (horaZarpe)
        let manMin=null;
        if(z.inicioRampa&&z.horaZarpe) manMin=Math.max(0,t2m(z.horaZarpe)-t2m(z.inicioRampa));
        const cell=(lbl,val)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.1)">
          <span style="font-size:10px;opacity:.6">${lbl}</span>
          <span style="font-size:13px;font-weight:700">${val}</span>
        </div>`;
        return `<div style="margin-top:8px">
          ${rollMin!==null?cell('Roll Off/On',m2hm(rollMin)+' h'):''}
          ${paxMin!==null?cell('Desemb. Pax',m2hm(paxMin)+' h'):''}
          ${manMin!==null?cell('Maniobra Desatraque',m2hm(manMin)+' h'):''}
        </div>`;
      })()}
      ${statusDiv}
    </div>`;
  } else {
    atCard=`<div style="background:${C.nav};border-radius:14px;padding:18px;margin-bottom:14px;text-align:center;color:rgba(255,255,255,.4);font-size:13px">Sin atraques registrados</div>`;
  }

  c.innerHTML=`<div style="padding:14px">
    ${atCard}
    ${copySection}
    <div style="font-size:10px;font-weight:700;color:${C.nav};margin-bottom:10px;letter-spacing:.7px">REGISTRAR</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      ${mBtn('','⚓','Nuevo Atraque','',`dispatch('go','sup_at')`)}
      ${mBtn('','🚢','Registrar Zarpe',oas.length?bdg(oas.length+' abierto'+(oas.length>1?'s':''),'#DBEAFE','#1E40AF'):'',`dispatch('go','sup_zsel')`)}
      ${mBtn('','⚠️','Registrar Delays',oas.length?bdg(oas.length+' nave'+(oas.length>1?'s':''),'#FEF3C7','#744210'):'',`dispatch('go','sup_delay')`)}
    </div>
    <div style="font-size:10px;font-weight:700;color:${C.nav};margin-bottom:10px;letter-spacing:.7px">EDITAR REGISTROS EN CURSO</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${mBtn('','✎','Editar Atraque abierto','',`S._adminEdit=false;dispatch('go','sup_edit_at')`)}
      ${mBtn('','✎','Editar Zarpe — nave activa','',`S._adminEdit=false;dispatch('go','sup_edit_z')`)}
    </div>
    ${S.cfg?.postUrl?`<div style="margin-top:16px">
      <div style="font-size:10px;font-weight:700;color:${C.nav};margin-bottom:8px;letter-spacing:.7px">SINCRONIZACIÓN</div>
      ${u>0
        ?`<button onclick="dispatch('syncAll')" style="width:100%;padding:13px 16px;background:${C.gr};color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
            <span>☁</span><span>Sincronizar ${u} registro(s) pendiente(s)</span>
          </button>`
        :`<div style="background:#F0FFF4;border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#276749;font-weight:600">
            <span>✅</span><span>Todo sincronizado</span>
            ${S.online?'':'<span style="margin-left:auto;font-size:10px;background:#FEF3C7;color:#744210;padding:2px 7px;border-radius:8px">Sin conexión</span>'}
          </div>`}
    </div>`:''}
  </div>`;
}

window.updAtDisplay=function(){
  const ep=parseFloat(document.getElementById('fa_ep')?.value)||0;
  const dr=parseFloat(document.getElementById('fa_dr')?.value)||0;
  const tp=ep+dr, ini=document.getElementById('fa_ini')?.value||'';
  const vessel=document.getElementById('fa_vessel')?.value||S.vessels[0];
  const at=S.recs.find(r=>r.type==='atraque'&&r.vessel===vessel&&r.status==='open');
  const p=at?getParam(at.id):{targetRate:23,minManiobra:20};
  let etc='',etd='';
  if(ini&&tp&&+p.targetRate){etc=addMin(ini,tp/+p.targetRate);etd=addMin(etc,+p.minManiobra);}
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('at_tp',tp?fmtN(tp)+' mts':'--'); set('at_etc',etc||'--:--'); set('at_etd',etd||'--:--');
};
window.saveAt=function(eid,isEd){
  const g=id=>document.getElementById(id)?.value||'';
  const ex=isEd==='true'?S.recs.find(r=>r.id===eid):null;
  dispatch('saveAt',{id:eid||gid(),type:'atraque',timestamp:ex?.timestamp||new Date().toISOString(),
    date:g('fa_date')||today(),vessel:g('fa_vessel'),port:'',
    inicioDesc:g('fa_ini'),empProyec:parseFloat(g('fa_ep'))||'',descRec:parseFloat(g('fa_dr'))||'',
    terminoDesc:g('fa_termDesc'),inicioEmb:g('fa_iniEmb'),
    obs:g('fa_obs'),status:ex?.status||'open',synced:false});
};

window.updZ=function(aid){
  const at=getAt(aid);if(!at)return;
  const fd=document.getElementById('fz_fd')?.value||today();
  const fe=document.getElementById('fz_f')?.value||'';
  const te=(parseFloat(document.getElementById('fz_e')?.value)||0)+(+at.descRec||0);
  const dm=delMin(aid),p=getParam(aid);
  let tt=0,pause=0,tiempoOp=0,tiempoReal=0,rN='',rB='',ef='',efsd='',efPax='',efInt='';
  if(at.inicioDesc&&fe){
    tt=dtDiff(at.date,at.inicioDesc,fd,fe);
    if(at.terminoDesc&&at.inicioEmb)pause=Math.max(0,t2m(at.inicioEmb)-t2m(at.terminoDesc));
    tiempoOp=Math.max(0,tt-pause);tiempoReal=Math.max(0,tiempoOp-dm);
    if(te&&tiempoReal)rN=+(te/tiempoReal).toFixed(2);
    if(te&&tiempoOp) rB=+(te/tiempoOp).toFixed(2);
    if(rB&&+p.targetRate)ef=+(+rB/+p.targetRate*100).toFixed(1);
    if(rN&&+p.targetRate)efsd=+(+rN/+p.targetRate*100).toFixed(1);
  }
  // eficPax from current pax time inputs
  const pI=document.getElementById('fz_pax_ini')?.value||'';
  const pF=document.getElementById('fz_pax_fin')?.value||'';
  const paxMin=(pI&&pF)?Math.max(0,t2m(pF)-t2m(pI)):0;
  const pasajeros=parseFloat(document.getElementById('fz_p')?.value)||0;
  if(paxMin&&+p.targetPaxTime) efPax=Math.min(100,+(+p.targetPaxTime/paxMin*100).toFixed(1));
  if(ef!==''&&efPax!=='') efInt=+(+ef*0.7 + +efPax*0.3).toFixed(1);
  const ch=(k,v,col)=>`<div style="background:#f8fafc;border-radius:8px;padding:9px"><div style="font-size:8px;color:${C.gray};margin-bottom:2px">${k}</div><div style="font-size:15px;font-weight:700;color:${col||C.tx}">${v||'--'}</div></div>`;
  const box=document.getElementById('zRes');if(!box)return;
  box.innerHTML=`<div style="font-size:8px;font-weight:700;color:#276749;margin-bottom:10px;letter-spacing:.5px">RESULTADOS</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:9px">
      ${ch('Total Ejecutado',te?fmtN(te)+' mts':'--',C.nav)}${ch('Tiempo Real (min)',tiempoReal||'')}
      ${ch('RATE Alcanzado',rB?rB+' m/min':'',rB?rateCol(rB,p.targetRate):C.gray)}${ch('RATE s/Demoras',rN?rN+' m/min':'',C.or)}
    </div>
    <div style="height:1px;background:${C.lt};margin:0 0 9px"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      ${ch('Efic. Carga',ef?ef+'%':'',ef?effCol(ef):C.gray)}
      ${ch('Efic. Pax',efPax!==''?efPax+'%':'sin datos',efPax!==''?effCol(efPax):C.gray)}
      ${ch('Efic. Integral',efInt!==''?efInt+'%':'sin pax',efInt!==''?effCol(efInt):C.gray)}
    </div>
    ${efPax===''&&pI?`<div style="margin-top:8px;font-size:10px;color:${C.gray}">Ingresa Término Desembarque Pax para ver Efic. Integral</div>`:''}
    ${dm>0&&rN?`<div style="margin-top:10px;background:rgba(85,60,154,.08);border-radius:8px;padding:10px;font-size:11px;color:${C.pur};line-height:1.6">Los <strong>${dm} min</strong> de demora ≈ <strong>${fmtN(Math.round(+rN*dm))} mts</strong> de capacidad no aprovechada.</div>`:''}`;
};

window.updZarpeATD=function(aid){
  const horaZarpe=document.getElementById('fz_zarpe')?.value||'';

  if(!horaZarpe){if(note)note.style.display='none';return;}

window.confirmZarpe=function(aid,zid){

    <div style="font-size:17px;font-weight:700;color:${C.nav};margin-bottom:7px">¿Cómo deseas guardar?</div>
    <div style="font-size:12px;color:${C.gray};line-height:1.6">Cierra el atraque si la nave ya zarpó, o guarda para editar después.</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <button onclick="doSaveZ('${aid}','${zid}',true)" style="${SBA}background:${C.gr};color:#fff;">✓  Cerrar — nave ya zarpó</button>
    <button onclick="doSaveZ('${aid}','${zid}',false)" style="${SBA}background:#fff;color:${C.tx};border:1.5px solid ${C.lt};">📝  Guardar y dejar abierto</button>

window.doSaveZ=function(aid,zid,close){
  const at=getAt(aid);if(!at)return;
  const g=id=>document.getElementById(id)?.value||'';
  const fd=g('fz_fd')||today(),fe=g('fz_f');
  const totalEmb=parseFloat(g('fz_e'))||'';
  const te=(+totalEmb||0)+(+at.descRec||0),dm=delMin(aid),p=getParam(aid);
  let tt=0,pause=0,tiempoOp=0,tiempoReal=0,rN='',rB='',ef='',efsd='',efPax='',efInt='';
  if(at.inicioDesc&&fe){
    tt=dtDiff(at.date,at.inicioDesc,fd,fe);
    if(at.terminoDesc&&at.inicioEmb)pause=Math.max(0,t2m(at.inicioEmb)-t2m(at.terminoDesc));
    tiempoOp=Math.max(0,tt-pause);tiempoReal=Math.max(0,tiempoOp-dm);
    if(te&&tiempoReal)rN=+(te/tiempoReal).toFixed(2);
    if(te&&tiempoOp) rB=+(te/tiempoOp).toFixed(2);
    if(rB&&+p.targetRate)ef=+(+rB/+p.targetRate*100).toFixed(1);
    if(rN&&+p.targetRate)efsd=+(+rN/+p.targetRate*100).toFixed(1);
  }
  const pI=g('fz_pax_ini'),pF=g('fz_pax_fin');
  const paxMin=(pI&&pF)?Math.max(0,t2m(pF)-t2m(pI)):0;
  if(paxMin&&+p.targetPaxTime) efPax=Math.min(100,+(+p.targetPaxTime/paxMin*100).toFixed(1));
  if(ef!==''&&efPax!=='') efInt=+(+ef*0.7 + +efPax*0.3).toFixed(1);
  const z={id:zid||gid(),type:'zarpe',timestamp:new Date().toISOString(),
    atraqueId:aid,finDate:fd,finEmbarque:fe,
    inicioRampa:g('fz_rampa'),horaZarpe:g('fz_zarpe'),
    paxIni:pI,paxFin:pF,
    totalEmb,pasajeros:parseFloat(g('fz_p'))||'',
    totalEjec:te,tiempoTotal:tt,tiempoPausa:pause,tiempoReal,
    rateNeto:rN,rateBruto:rB,efic:ef,eficSinDelays:efsd,
    eficPax:efPax,eficIntegral:efInt,obs:g('fz_obs'),synced:false};
  dispatch('saveZ',{z,at,closeVessel:close});
};

window.renderDelayRows=function(){

  rows.innerHTML='';
  if(ex.length){

    d.innerHTML=`<div style="font-size:9px;font-weight:700;color:${C.rd};margin-bottom:8px;letter-spacing:.5px">DELAYS YA REGISTRADOS</div>`+
      ex.map(x=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #FED7D7;font-size:12px"><span>${x.motivo||'Sin motivo'}</span><span style="font-weight:700;color:${C.rd}">${x.delayMin} min</span></div>`).join('')+

    </div>

      <div><label style="${SL}">Minutos</label>
        <input type="number" min="1" step="1" value="${d.delayMin}" placeholder="ej. 25"
          style="${SI}" oninput="updPending(${i},'delayMin',this.value)"></div>
      <div><label style="${SL}">Motivo</label>
        <input type="text" value="${d.motivo}" placeholder="Describe el motivo..."
          style="${SI}font-size:14px;font-weight:400;" oninput="updPending(${i},'motivo',this.value)"></div>

  });
};
window.updPending    =(i,f,v)=>{if(S.pendingDelays[i])S.pendingDelays[i][f]=v;};
window.addDelayRow   =()=>{S.pendingDelays.push({delayMin:'',motivo:''});renderDelayRows();};
window.removeDelayRow=i=>{S.pendingDelays.splice(i,1);if(!S.pendingDelays.length)S.pendingDelays=[{delayMin:'',motivo:''}];renderDelayRows();};
window.saveDelays=()=>{
  const aid=document.getElementById('fd_at')?.value||'';
  if(!aid){alert('Selecciona un buque');return;}
  const toSave=S.pendingDelays.filter(d=>+d.delayMin>0);
  if(!toSave.length){alert('Ingresa al menos un tiempo de delay');return;}
  S.pendingDelays=[];
  dispatch('saveDelays',{aid,delays:toSave});
};

window.confirmDeleteRec = function(id, type){
  const rec = S.recs.find(r=>r.id===id);
  if(!rec){ showModal(`<div style="text-align:center;padding:16px"><div style="font-size:36px;margin-bottom:10px">⚠️</div><div style="font-size:13px;color:${C.gray}">Registro no encontrado.</div><button onclick="hideModal()" style="${SB}">Cerrar</button></div>`); return; }
  const label = type==='atraque'
    ? `Atraque de <strong>${rec.vessel||'?'}</strong> del ${fmtD(rec.date||'')}`
    : `Zarpe de <strong>${(getAt(rec.atraqueId)?.vessel||'?')}</strong>`;
  const linkedZ = type==='atraque' ? getZ(id) : null;
  const cascadeWarn = linkedZ
    ? `<div style="background:#FEE2E2;border-radius:8px;padding:9px 12px;margin:10px 0;font-size:11px;color:#991B1B;line-height:1.7">⚠️ Este Atraque tiene un <strong>Zarpe vinculado</strong> que también se eliminará.</div>` : '';
  showModal(`
