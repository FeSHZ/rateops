      <div style="font-size:36px;margin-bottom:8px">🗑</div>
      <div style="font-size:16px;font-weight:700;color:${C.rd};margin-bottom:4px">Eliminar registro</div>
      <div style="font-size:12px;color:${C.gray}">¿Confirmas eliminar ${label}?</div>
    </div>
    ${cascadeWarn}
    <div style="background:#FEF3C7;border-radius:8px;padding:9px 12px;margin-bottom:16px;font-size:11px;color:#744210;line-height:1.7">
      🔐 Esta acción es <strong>irreversible</strong>. El registro se eliminará del historial local y deberá sincronizarse para actualizar la nube.
    </div>
    <div style="display:flex;gap:9px">
      <button onclick="execDeleteRec('${id}','${type}')" style="${SBA}background:${C.rd};color:#fff;font-weight:700;">🗑 Sí, eliminar</button>
      <button onclick="hideModal()" style="${SBA}background:${C.bg};color:${C.tx};border:1.5px solid ${C.lt};">Cancelar</button>
    </div>`);
};

window.execDeleteRec = function(id, type){
  hideModal();
  const idx = S.recs.findIndex(r=>r.id===id);
  if(idx<0) return;
  if(type==='atraque'){
    // Remove linked zarpe and delays too
    const linkedZidx = S.recs.findIndex(r=>r.type==='zarpe'&&r.atraqueId===id);
    if(linkedZidx>=0) S.recs.splice(linkedZidx,1);
    S.recs = S.recs.filter(r=>!(r.type==='delay'&&r.atraqueId===id));
  }
  const idx2 = S.recs.findIndex(r=>r.id===id); // re-find after splice
  if(idx2>=0) S.recs.splice(idx2,1);
  saveRecs(); rebuildCache([]);
  // Navigate back to edit list
  const mode = type==='atraque'?'adm_edit_at':'adm_edit_z';
  S.screen=mode; S._adminEdit=true; render();
};

function showAdminImpactAlert(oldRec, newRec, oldZ, newZ, onConfirm){
  const isAt = oldRec.type==='atraque'||newRec.type==='atraque';

  // Build diff rows for the primary record
  const primaryFields = isAt
    ? ['vessel','date','inicioDesc','terminoDesc','inicioEmb','empProyec','descRec','obs']

    vessel:'Buque', date:'Fecha', inicioDesc:'Inicio Descarga',

    .filter(k=>{
      const ov=String(oldRec[k]||''), nv=String(newRec[k]||'');
      return ov!==nv || ov || nv;
    })
    .map(k=>{
      const ov=String(oldRec[k]||'--'), nv=String(newRec[k]||'--');

        <td style="padding:5px 8px;font-size:11px;font-weight:600;white-space:nowrap">${primaryLabels[k]||k}</td>

        </td>

    }).join('');

  // Build formula impact rows (zarpe results before/after)
  const fmtZVal=(z,k)=>z&&z[k]!=null&&z[k]!==''?z[k]:'--';
  const formulaRows = (oldZ||newZ) ? ['rateNeto','rateBruto','efic','eficSinDelays','tiempoReal','totalEjec'].map(k=>{
    const ov=fmtZVal(oldZ,k), nv=fmtZVal(newZ,k);

    return `<tr style="${changed?'background:#FFF3E0':''}">
      <td style="padding:4px 8px;font-size:11px;font-weight:600">${labels[k]||k}</td>
      <td style="padding:4px 8px;font-size:11px;color:#374151">${ov}</td>
      <td style="padding:4px 8px;font-size:11px;font-weight:${changed?700:400};color:${changed?'#B45309':'#374151'}">${nv}${changed?'  ↻':''}</td>
    </tr>`;
  }).join('') : '';

  const hasFormulaChanges = (oldZ||newZ) && ['rateNeto','rateBruto','efic','eficSinDelays'].some(k=>String(fmtZVal(oldZ,k))!==String(fmtZVal(newZ,k)));

  const vesselDate=`${oldRec.vessel||newRec.vessel||'?'} · ${fmtD(oldRec.date||newRec.date||'')}`;

  showModal(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="width:40px;height:40px;border-radius:20px;background:#FEF3C7;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">⚠️</div>
      <div>
        <div style="font-size:15px;font-weight:700;color:${C.rd}">Modificación de registro cerrado</div>
        <div style="font-size:11px;color:${C.gray}">🚢 ${vesselDate}</div>
      </div>
    </div>

    ${hasFormulaChanges?`<div style="background:#FEF3C7;border-radius:9px;padding:9px 12px;margin-bottom:12px;font-size:11px;color:#744210;line-height:1.7">
      📊 <strong>Impacto histórico:</strong> Este cambio modificará el RATE, Eficiencia y/o tiempos ya registrados. Los gráficos históricos reflejarán los nuevos valores al sincronizar.
    </div>`:''}

    <div style="font-size:10px;font-weight:700;color:${C.nav};margin-bottom:6px;letter-spacing:.5px">CAMBIOS EN DATOS</div>
    <div style="overflow-x:auto;margin-bottom:${formulaRows?'12px':'14px'}">

// Helper: format number with commas if it's a valid number, otherwise return as-is
const fmtWA = v => {
  if(v===null||v===undefined||v===''||v==='--') return '--';
  const n = parseFloat(String(v).replace(/,/g,''));
  if(isNaN(n)) return v;
  return n.toLocaleString('es-MX', {maximumFractionDigits:2});
};

const DEFAULT_TPL_AT =
`Atraque
Fecha {{fecha}}
Inicio de descarga  {{inicioDesc}}
ETD  {{etd}}
Mts enviados  {{empProyec}}
Mts recibidos  {{descRec}}
Mts mov  {{totalPlan}}
RATE  {{targetRate}}  Buque {{vessel}}
pendientes a la salida{{obs}}`;

const DEFAULT_TPL_Z =
`Fin de Embarque.- {{finEmbarque}}
Inicio Rampa.- {{inicioRampa}}
Pasaje total.- {{pasajeros}}
Metros.- {{totalEmb}}{{obs}}`;

function getTpl(type){ return ls('ro_tpl_'+type)||(type==='atraque'?DEFAULT_TPL_AT:DEFAULT_TPL_Z); }
function saveTpl(type,tpl){ lss('ro_tpl_'+type,tpl); }

function applyTpl(tpl, rec, atRec){
  const p = rec.type==='atraque'?getParam(rec.id):{targetRate:23};
  const at = atRec||rec;
  const desembPax = (rec.paxIni||rec.paxFin)
    ? `\nDesembarque Pasajeros.- ${rec.paxIni||'--'} / ${rec.paxFin||'--'}`
    : '';
  const tokens = {
    // atraque tokens
    fecha:       fmtD(rec.date||at.date||''),
    inicioDesc:  rec.inicioDesc||at.inicioDesc||'--',
    etc:         rec.etc||at.etc||'--',
    etd:         rec.etd||at.etd||'--',
    empProyec:   fmtWA(rec.empProyec||at.empProyec),
    descRec:     fmtWA(rec.descRec||at.descRec),
    totalPlan:   fmtWA(rec.totalPlan||at.totalPlan),
    targetRate:  fmtWA(p.targetRate||23),
    vessel:      rec.vessel||at.vessel||'--',
    // zarpe tokens
    finEmbarque: rec.finEmbarque||'--',
    inicioRampa: rec.inicioRampa||'--',
    horaZarpe:   rec.horaZarpe||'--',
    desembPax,
    pasajeros:   fmtWA(rec.pasajeros),
    totalEmb:    fmtWA(rec.totalEmb),
    totalEjec:   fmtWA(rec.totalEjec),
    rateNeto:    fmtWA(rec.rateNeto),
    rateBruto:   fmtWA(rec.rateBruto),
    efic:        rec.efic!=null&&rec.efic!==''?rec.efic+'%':'--',
    // shared
    obs:         rec.obs ? '\n'+rec.obs : ''
  };
  return tpl.replace(/\{\{(\w+)\}\}/g, (_,k)=> tokens[k]!==undefined ? tokens[k] : `{{${k}}}`);
}

window.insertToken = function(chip, token){
  // Find which textarea is focused, or default to atraque
  const focused = document.activeElement;
  let ta = (focused&&(focused.id==='tpl_at'||focused.id==='tpl_z')) ? focused : document.getElementById('tpl_at');
  if(!ta) return;
  const s=ta.selectionStart, e=ta.selectionEnd;
  ta.value = ta.value.slice(0,s) + token + ta.value.slice(e);
  ta.selectionStart = ta.selectionEnd = s + token.length;
  ta.focus();
};

window.doCopyWA = function(btn){
  const txt = window._waTxt||'';
  const status = document.getElementById('copyStatus');
  const doConfirm = () => {
    if(btn){ btn.textContent='✓ Copiado'; btn.style.background='#15803D'; }
    if(status){ status.style.display='block'; }
  };
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(doConfirm).catch(()=>{ fallbackCopy(txt); doConfirm(); });
  } else { fallbackCopy(txt); doConfirm(); }
};
function fallbackCopy(txt){
  const ta=document.createElement('textarea');
  ta.value=txt; ta.style.cssText='position:fixed;top:-9999px;';
  document.body.appendChild(ta); ta.select();
  try{document.execCommand('copy');}catch{}
  document.body.removeChild(ta);
}

window.runConnectionTest=async function(){
  const btn=document.getElementById('btnTest');
  const res=document.getElementById('testResult');
  if(!btn||!res) return;
  btn.textContent='Probando...'; btn.disabled=true;
  const r=await testConnection();
  btn.textContent='🔗 Probar conexión'; btn.disabled=false;
  const lines=[];
  if(r.postOk===true)  lines.push('✅ POST: conexión exitosa');
  if(r.postOk===false) lines.push('❌ POST: sin respuesta — verifica la URL');
  if(r.postOk===null)  lines.push('— POST: no configurado');
  if(r.getOk===true)   lines.push('✅ GET: conexión exitosa');

  if(r.getOk===null)   lines.push('— GET: no configurado');

// ── DUPLICATE DETECTION ───────────────────────
// Check if atraque with same vessel + same date already exists (ignores time)
function isDuplicateAtraque(vessel, date, excludeId){
  return S.recs.some(r=>
    r.type==='atraque' &&
    r.id !== excludeId &&
    (r.vessel||'').toLowerCase() === (vessel||'').toLowerCase() &&
    (r.date||'') === (date||'')
  );
}

};

window.exportCSV = function(){
  // Build three CSV sheets and pack into a ZIP-less multi-section text
  // For simplicity: export each type as separate download
  const ats     = S.recs.filter(r=>r.type==='atraque');
  const zarpes  = S.recs.filter(r=>r.type==='zarpe');
  const delays  = S.recs.filter(r=>r.type==='delay');

  const toCSV = (rows, cols) => {
    const esc = v => v==null?'':String(v).includes(',')?`"${String(v).replace(/"/g,'""')}"`:String(v);
    return [cols.join(','), ...rows.map(r=>cols.map(c=>esc(r[c])).join(','))].join('\r\n');
  };

  const atCols = ['id','timestamp','date','vessel','port','inicioDesc','terminoDesc','inicioEmb',
                  'empProyec','descRec','totalPlan','targetRate','minManiobra','etc','etd','obs','status'];
  const zCols  = ['id','timestamp','atraqueId','finDate','finEmbarque','paxIni','paxFin',
                  'inicioRampa','horaZarpe','totalEmb','pasajeros','totalEjec',
                  'tiempoTotal','tiempoPausa','tiempoReal','rateNeto','rateBruto',
                  'efic','eficSinDelays','eficPax','eficIntegral','wCarga','wPax','obs'];
  const dCols  = ['id','timestamp','atraqueId','vessel','date','delayMin','motivo'];

  const ts = new Date().toISOString().slice(0,10);
  const files = [
    {name:`RateOps_ATRAQUES_${ts}.csv`, csv:toCSV(ats,atCols)},
    {name:`RateOps_ZARPES_${ts}.csv`,   csv:toCSV(zarpes,zCols)},
    {name:`RateOps_DELAYS_${ts}.csv`,   csv:toCSV(delays,dCols)},
  ];

  files.forEach(({name,csv})=>{
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=name;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  });

  showModal(`<div style="text-align:center;padding:16px">
    <div style="font-size:40px;margin-bottom:10px">📊</div>
    <div style="font-size:14px;font-weight:700;color:${C.gr};margin-bottom:8px">3 archivos CSV exportados</div>
    <div style="font-size:11px;color:${C.gray};margin-bottom:12px;line-height:1.8">
      📄 RateOps_ATRAQUES_${ts}.csv &nbsp;·&nbsp; ${ats.length} filas<br>
      📄 RateOps_ZARPES_${ts}.csv &nbsp;·&nbsp; ${zarpes.length} filas<br>
      📄 RateOps_DELAYS_${ts}.csv &nbsp;·&nbsp; ${delays.length} filas
    </div>
    <div style="background:${C.bg};border-radius:9px;padding:10px;font-size:10px;color:${C.gray};text-align:left;line-height:1.7;margin-bottom:14px">
      💡 Para subir a Excel: abre cada CSV → copia el contenido → pégalo en la hoja correspondiente (ATRAQUES / ZARPES / DELAYS) del archivo RateOps_DB.xlsx.
    </div>
    <button onclick="hideModal()" style="${SB}">Listo</button>
  </div>`);
};

window.importJSON = function(){
  const input = document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange = e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try {
        const data = JSON.parse(ev.target.result);
        if(!data.recs||!Array.isArray(data.recs)) throw new Error('Formato inválido');
        const nRecs=data.recs.length, nAts=data.recs.filter(r=>r.type==='atraque').length;
        showModal(`<div style="text-align:center;margin-bottom:16px">
          <div style="font-size:36px;margin-bottom:8px">📂</div>
          <div style="font-size:15px;font-weight:700;color:${C.nav};margin-bottom:8px">Confirmar importación</div>
          <div style="font-size:12px;color:${C.gray};line-height:1.7;margin-bottom:12px">
            Archivo: <strong>${file.name}</strong><br>
            Exportado el: <strong>${data.exportedAt?data.exportedAt.slice(0,10):'desconocido'}</strong><br>
            Registros: <strong>${nRecs}</strong> (${nAts} atraques)<br><br>
            <span style="color:${C.rd};font-weight:600">⚠️ Los registros actuales se mezclarán con los importados. Los duplicados por ID se ignorarán.</span>
          </div>
          <div style="display:flex;gap:10px">
            <button onclick="doImportJSON()" style="${SBA}background:${C.nav};color:#fff;font-weight:700">Importar y mezclar</button>
            <button onclick="hideModal()" style="${SBA}background:${C.bg};color:${C.tx};border:1.5px solid ${C.lt};">Cancelar</button>
          </div>
        </div>`);
        // store parsed data temporarily
        window._importBuf = data;
      } catch(err){
        showModal(`<div style="text-align:center;padding:16px">
          <div style="font-size:36px;margin-bottom:10px">❌</div>
          <div style="font-size:14px;font-weight:700;color:${C.rd};margin-bottom:8px">Archivo inválido</div>
          <div style="font-size:12px;color:${C.gray};margin-bottom:16px">${err.message}</div>
          <button onclick="hideModal()" style="${SB}">Cerrar</button>
        </div>`);
      }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input); input.click(); document.body.removeChild(input);
};

window.doImportJSON = function(){
  const data = window._importBuf; if(!data) return;
  const existingIds = new Set(S.recs.map(r=>r.id));
  const newRecs = (data.recs||[]).filter(r=>!existingIds.has(r.id));
  S.recs = [...S.recs, ...newRecs];
  // Merge vessels
  if(data.vessels) data.vessels.forEach(v=>{if(!S.vessels.includes(v)) S.vessels.push(v);});
  // Merge params
  if(data.params) Object.assign(S.params, data.params);
  // Merge vesselMeta
  if(data.vesselMeta){const m=ls('ro_vessel_meta')||{};Object.assign(m,data.vesselMeta);lss('ro_vessel_meta',m);}
  // Merge targetRanges
  if(data.targetRanges){const r=ls('ro_target_ranges')||[];const ids=new Set(r.map(x=>x.from+x.to));data.targetRanges.forEach(rg=>{if(!ids.has(rg.from+rg.to))r.push(rg);});lss('ro_target_ranges',r);}
  saveRecs();
  lss('ro_vessels', S.vessels);
  lss('ro_params', S.params);
  S.chartCache = buildChartData(S.recs);
  saveCache();
  window._importBuf = null;
  hideModal();
  showModal(`<div style="text-align:center;padding:16px">
    <div style="font-size:40px;margin-bottom:10px">✅</div>
    <div style="font-size:14px;font-weight:700;color:${C.gr};margin-bottom:8px">Importación completada</div>
    <div style="font-size:11px;color:${C.gray};margin-bottom:16px;line-height:1.6">
      ${newRecs.length} registros nuevos importados.<br>
      ${(data.recs||[]).length - newRecs.length} registros duplicados ignorados.
    </div>
    <button onclick="hideModal();dispatch('go','hist')" style="${SB}">Ver Histórico</button>
    <button onclick="hideModal()" style="${SBW}">Cerrar</button>
  </div>`);
  render();
};

// ═══════════════════════════════════════════════
// INIT

loadState();
PHRASE_TODAY = getPhrase(); // safe here — ls/lss already defined
if(!S.chartCache&&S.recs.length) { S.chartCache=buildChartData(S.recs); saveCache(); }
// Reset cached WhatsApp templates to new defaults (version bump)
if(ls('ro_tpl_version')!=='2') {
  lss('ro_tpl_atraque', DEFAULT_TPL_AT);
  lss('ro_tpl_zarpe',   DEFAULT_TPL_Z);
  lss('ro_tpl_version', '2');
}
// Admin role is never persisted across reloads — always requires fresh password
if(S.role==='admin') { S.role=null; lss('ro_role',null); }
if(S.role==='editor') { if(!['sup_home','sup_at','sup_zsel','sup_zform','sup_delay','sup_edit_at','sup_edit_z'].includes(S.screen)) S.screen='sup_home'; }
else if(S.role==='viewer') { if(S.screen!=='hist') S.screen='hist'; }
render();
if(S.online&&S.cfg?.getUrl) loadCloudAndCache();
</script>
